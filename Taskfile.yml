version: '3'

# Root Task orchestration — the single entry point for the polyglot monorepo.
# Language-specific tasks live in Taskfile.{go,py,ts,contracts}.yml.
# Canonical command reference: docs/implementation/dk-p0-monorepo.md §3.

includes:
  go: ./Taskfile.go.yml
  py: ./Taskfile.py.yml
  ts: ./Taskfile.ts.yml
  contracts: ./Taskfile.contracts.yml

tasks:
  doctor:
    desc: Verify the required toolchain binaries are installed.
    silent: true
    cmds:
      - |
        missing=0
        for tool in node pnpm uv go golangci-lint oapi-codegen goose sqlc docker jq; do
          if ! command -v "$tool" >/dev/null 2>&1; then
            echo "MISSING: $tool"
            missing=1
          fi
        done
        if [ "$missing" -ne 0 ]; then
          echo "task doctor: required tools are missing (see MISSING lines above)."
          exit 1
        fi
        echo "All tools present"

  setup:
    desc: Bootstrap a fresh clone (pnpm + uv + go.work + codegen).
    cmds:
      - pnpm install --frozen-lockfile
      - uv sync --group dev
      - task: go:init
      - task: go:sync
      - task: contracts:generate

  dev:
    desc: Bring up the local dev stack (PostgreSQL 18, otel/grafana/loki/tempo, mailpit, spotlight).
    silent: true
    vars:
      COMPOSE: docker compose -f deploy/compose.dev.yml
    cmds:
      - "{{.COMPOSE}} up -d"
      # Wait for the PostgreSQL healthcheck before returning (migrations/watchers
      # wire in with the S5 DB foundation).
      - |
        echo "Waiting for PostgreSQL 18 to become healthy..."
        for i in $(seq 1 60); do
          status=$({{.COMPOSE}} ps postgres --format '{{`{{.Health}}`}}' 2>/dev/null || true)
          if [ "$status" = "healthy" ]; then
            echo "PostgreSQL is healthy. Dev stack is up:"
            echo "  Grafana   http://localhost:3000   (anonymous admin)"
            echo "  Mailpit   http://localhost:8025"
            echo "  Spotlight http://localhost:8969"
            exit 0
          fi
          sleep 2
        done
        echo "PostgreSQL did not become healthy in time." >&2
        {{.COMPOSE}} logs postgres >&2
        exit 1

  build:all:
    desc: Build every plane (contracts first, then each language).
    cmds:
      - task: contracts:generate
      - task: go:build
      - task: py:build
      - task: ts:build

  test:all:
    desc: Run every language test suite in parallel.
    deps:
      - go:test
      - py:test
      - ts:test

  lint:all:
    desc: Run every language linter in parallel.
    deps:
      - go:lint
      - py:lint
      - ts:lint

  db:reset:
    desc: Drop + recreate the dev database (migrations + fixtures wire in with S5).
    silent: true
    vars:
      COMPOSE: docker compose -f deploy/compose.dev.yml
    cmds:
      # Ensure Postgres is up and healthy before touching it.
      - "{{.COMPOSE}} up -d postgres"
      - |
        for i in $(seq 1 60); do
          status=$({{.COMPOSE}} ps postgres --format '{{`{{.Health}}`}}' 2>/dev/null || true)
          [ "$status" = "healthy" ] && break
          sleep 2
        done
        if [ "$status" != "healthy" ]; then
          echo "PostgreSQL is not healthy; cannot reset." >&2
          exit 1
        fi
      # Drop and recreate from the maintenance DB. FORCE terminates open sessions
      # (PostgreSQL 13+). Migrations (goose) and River migrate + fixtures land in S5.
      - "{{.COMPOSE}} exec -T postgres psql -v ON_ERROR_STOP=1 -U market_ops -d postgres -c \"DROP DATABASE IF EXISTS market_ops WITH (FORCE);\""
      - "{{.COMPOSE}} exec -T postgres psql -v ON_ERROR_STOP=1 -U market_ops -d postgres -c \"CREATE DATABASE market_ops OWNER market_ops;\""
      - echo "Dev database 'market_ops' recreated (migrations + fixtures arrive in S5)."

  ci:local:
    desc: Everything CI runs, in order — the pre-merge gate.
    cmds:
      - task: contracts:drift
      - task: lint:all
      - task: test:all
