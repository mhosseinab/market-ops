version: '3'

# TypeScript tasks. pnpm workspaces; gen/ts is a workspace member (workspace:*).

tasks:
  test:
    desc: Run vitest across every workspace member.
    cmds:
      - pnpm -r test

  lint:
    desc: Typecheck every member and run biome across the repo.
    cmds:
      - pnpm -r typecheck
      - pnpm biome check .

  fmt:
    desc: Format the repo with biome.
    cmds:
      - pnpm biome check --write .

  build:
    desc: Build the web app and extension and reject dev-only production bundle content.
    # The extension's production packaging (apps/extension/scripts/build.mjs) FAILS
    # CLOSED when VITE_GATEWAY_BASE_URL is unset — it refuses to ship a manifest
    # scoped to the localhost dev default (issue #144). CI/pre-merge verification is
    # not a real release, so supply an explicit verification gateway here; a real
    # release pipeline overrides VITE_GATEWAY_BASE_URL with the deployed gateway
    # origin and that value wins. This is explicit config, never a silent default.
    env:
      VITE_GATEWAY_BASE_URL:
        sh: echo "${VITE_GATEWAY_BASE_URL:-https://gateway.example}"
    cmds:
      # --if-present so the task is a no-op green on scaffold members that have no
      # build script yet (web/extension build scripts land in their own steps) and
      # picks up each real build automatically as it arrives.
      - pnpm -r --if-present build
      - pnpm --filter @market-ops/web assert:prod-clean
      - pnpm --filter @market-ops/extension assert:prod-clean

  dev:
    desc: >-
      Start the Vite dev server for the web SPA (apps/web). Serves on
      http://localhost:5173. The SPA reads VITE_GATEWAY_BASE_URL (default `/api`)
      and talks to the Go core gateway over cookie-auth — no direct LLM-plane
      access. Vite proxies `/api` to the local core on :8080 and strips the
      prefix, matching the Caddy topology. The MV3 extension has no dev server;
      it builds to a load-unpacked bundle.
    cmds:
      - pnpm --filter @market-ops/web dev

  copylint:
    desc: >-
      Copy-lint (LOC-002): fail on any inline string literal / Persian-script text
      in UI components. All user-facing copy must flow through catalog keys.
      Covers apps/web (JSX) and the extension's UI surfaces — popup + content
      overlay (S31). apps/extension/src/lib is EXCLUDED: it legitimately
      contains Persian selector/DOM-matching DATA (e.g. the DK "ناموجود"
      unavailable badge text in dom-validate.ts) that is parsed website
      content, not user-facing extension copy.
    cmds:
      - node tools/copylint/copylint.mjs apps/web/src apps/extension/src/popup apps/extension/src/content

  pseudoloc:
    desc: >-
      Pseudo-localization + copy-lint gate (LOC-011). Copy-lint proves no inline
      copy; the vitest pseudo suite renders components under the expanded /
      bracketed / forced-LTR pack and fails on untranslated, clipped, or
      direction-broken output.
    cmds:
      - task: copylint
      - pnpm --filter @market-ops/locale test
      - pnpm --filter @market-ops/web test
