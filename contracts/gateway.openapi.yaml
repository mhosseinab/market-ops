openapi: 3.1.0
info:
  title: Market-Ops Gateway API
  description: >-
    Internal gateway API for the DK Marketplace Intelligence platform. This
    document is the single source of truth for the gateway contract (plan
    §4.3): the Go server (`gen/go`), the TypeScript client (`gen/ts`), and the
    Python client (`gen/python`) are all generated from it and committed. It is
    the ONLY hand-edited contract artifact; evolution is additive within P0.
    Schemas are named after the PRD §15.1 canonical records; one tag per domain.
  version: 0.0.0
  contact:
    name: api_data_contracts

servers:
  - url: http://localhost:8080
    description: Local dev (core service)

# Bearer (JWT) auth applies to the whole surface by default. Operational probes
# such as /healthz opt out with an explicit empty `security: []`.
security:
  - bearerAuth: []

# One tag per PRD §15.1 canonical domain. These are placeholders in v0 — the
# operations that populate them land in later [C] steps. Keeping the tag set
# here fixes the naming vocabulary every plane generates against.
tags:
  - name: system
    description: Liveness and build identity (unauthenticated operational probes).
  - name: organization
    description: Organization / Marketplace Account — reconciled account and capability state.
  - name: product
    description: Product / Variant / Listing / Owned Offer — canonical owned state with native IDs.
  - name: identity
    description: Market Product Identity — versioned Confirmed/Needs Review/Rejected/Obsolete mapping.
  - name: observation
    description: Observation / Observed Offer — append-only evidence and its derived current view.
  - name: economics
    description: Cost Profile / Margin Snapshot — versioned economics.
  - name: event
    description: Market Event — lifecycle records.
  - name: recommendation
    description: Recommendation — versioned, expiring policy result.
  - name: approval
    description: Approval Card — versioned, expiring rendering of exact action parameters.
  - name: selection
    description: Selection Set — named, versioned bulk scope.
  - name: action
    description: Action — append-only attempt and state history.
  - name: outcome
    description: Outcome Window — append-only measured result and confidence.
  - name: conversation
    description: Conversation / Context / Message — retained interaction records.
  - name: investigation
    description: Saved Investigation — pinned conversation.
  - name: pilot
    description: Pilot Assortment — versioned beta measurement unit.
  - name: session
    description: >-
      Authentication and session identity. Login, logout, and current-session
      lookup for the Owner/Operator/Internal roles (PRD §2.2). Sessions are
      server-side, carried in a secure httpOnly cookie — never a token in
      client storage (PRD §8, §12.3). Authorization is enforced server-side by
      the single shared permission matrix (ACC-002); scope is never inferred
      from token shape.

paths:
  /healthz:
    get:
      operationId: getHealthz
      tags:
        - system
      summary: Liveness probe with build identity.
      description: >-
        Returns service liveness plus the running binary's build identity.
        Unauthenticated so orchestrators and load balancers can probe it.
      security: []
      responses:
        '200':
          description: The service is live.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /connector/connect:
    post:
      operationId: connectConnector
      tags:
        - organization
      summary: Connect the DK account for a marketplace account.
      description: >-
        Exchanges a DK authorization code for tokens (stored encrypted at rest),
        seeds every §15.2 capability at Unknown, and runs the capability probes.
        Returns the reconciled connection + capability status (ACC-001).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectorConnectRequest'
      responses:
        '200':
          description: Connection established; capability status returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorStatus'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /connector/refresh:
    post:
      operationId: refreshConnector
      tags:
        - organization
      summary: Refresh the DK access token and re-run capability probes.
      description: >-
        Rotates the access token via the stored refresh token (re-encrypted at
        rest) and re-probes every capability so status and last-verified time
        stay current (ACC-001, ACC-003).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectorAccountRef'
      responses:
        '200':
          description: Token refreshed; capability status returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorStatus'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /connector/status:
    get:
      operationId: getConnectorStatus
      tags:
        - organization
      summary: Inspect connection and per-capability status.
      description: >-
        Returns the current connection state plus every §15.2 capability with
        its status and last-verified time. Capabilities default to Unknown and
        never enable dependent UI while Unknown (ACC-001).
      parameters:
        - name: marketplaceAccountId
          in: query
          required: true
          description: Marketplace account whose connector status is requested.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Current connection and capability status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorStatus'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /connector/disconnect:
    post:
      operationId: disconnectConnector
      tags:
        - organization
      summary: Disconnect the DK account and purge stored tokens.
      description: >-
        Marks the connection disconnected, purges the encrypted tokens, and
        resets every capability to Unknown so no dependent logic can run on a
        severed connection (ACC-001).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectorAccountRef'
      responses:
        '200':
          description: Connection disconnected; capabilities reset to Unknown.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorStatus'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/login:
    post:
      operationId: login
      tags:
        - session
      summary: Authenticate a user and open a server-side session.
      description: >-
        Verifies the email/password credential (argon2id, verified in constant
        time) and, on success, opens a server-side session and returns the
        current session identity. The session token is delivered ONLY in a
        secure httpOnly cookie (PRD §8, §12.3); it never appears in the response
        body. Public: this is how an unauthenticated user obtains a session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: >-
            Authenticated; session opened. A Set-Cookie header carries the
            server-side session token (secure, httpOnly).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfo'
        '401':
          description: Invalid credentials (fail closed; no distinction leaks which field was wrong).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/me:
    get:
      operationId: getCurrentSession
      tags:
        - session
      summary: Return the identity of the current session.
      description: >-
        Returns the user, organization, role, and expiry of the session bound to
        the request cookie. Requires a valid session; fails closed with 401 when
        the cookie is absent, unknown, or expired.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current session identity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfo'
        '401':
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/logout:
    post:
      operationId: logout
      tags:
        - session
      summary: Close the current server-side session.
      description: >-
        Deletes the server-side session bound to the request cookie and clears
        the cookie. Idempotent: closing an already-absent session succeeds.
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Session closed; the session cookie is cleared.
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /chat:
    post:
      operationId: chat
      tags:
        - conversation
      summary: Converse with the LLM plane over a Server-Sent Events stream.
      description: >-
        Opens (or continues) a conversation turn and streams the LLM plane's
        response as Server-Sent Events (PRD §19.3: SSE, no WebSocket). The
        gateway authenticates the browser session (cookie), authorizes the read
        action through the single shared permission matrix, and proxies the turn
        to the internal Python LLM service; it never lets free text approve,
        execute, or confirm anything (PRD §8, §12.3 — the LLM plane holds a
        read/Draft-only credential and no model tool advances an action past
        Draft). When the global or per-account kill switch is on, or the LLM
        plane is unreachable, chat returns a structured unavailable state and
        NOTHING else degrades — every structured screen stays fully functional
        (CHAT-009).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatTurnRequest'
      responses:
        '200':
          description: >-
            An event stream of turn events (text/event-stream). Each SSE `data:`
            frame is a JSON ChatStreamEvent. The stream is grounded, read/Draft
            only, and carries no approval control.
          content:
            text/event-stream:
              schema:
                type: string
                description: >-
                  Raw SSE frames. Each frame's `data:` payload is a JSON-encoded
                  ChatStreamEvent (documented for consumers; the transport is a
                  byte stream, not a JSON body).
        '503':
          description: >-
            Chat is unavailable: the kill switch is on (global or per-account) or
            the LLM plane is unreachable. Screens are unaffected (CHAT-009).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatUnavailable'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /identity/needs-review:
    get:
      operationId: listNeedsReview
      tags:
        - identity
      summary: List the Needs Review identity-mapping queue for an account.
      description: >-
        Returns the account's pending Market Product Identity candidates
        (journey 4 step 1): each row carries SKU (supplier code), variant and
        product title, and the native-id evidence a reviewer needs. Only
        NeedsReview candidates appear here — Confirmed/Rejected/Obsolete mappings
        are never in the queue. Confirming a candidate is the ONLY thing that
        makes a variant an observation target (CAT-002, OBS-001).
      parameters:
        - name: marketplaceAccountId
          in: query
          required: true
          description: Marketplace account whose review queue is requested.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The pending Needs Review candidates for the account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeedsReviewQueue'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /identity/confirm:
    post:
      operationId: confirmIdentity
      tags:
        - identity
      summary: Confirm a Needs Review candidate as the variant's active mapping.
      description: >-
        Transitions a NeedsReview candidate to Confirmed (journey 4 step 2). At
        most one active Confirmed mapping may exist per variant (CAT-002,
        enforced by a partial unique index); a second confirm for the same
        variant is rejected. Only after confirmation does the variant become an
        observation target (OBS-001). The decision is recorded in an append-only
        audit (who/when/evidence).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityDecisionRequest'
      responses:
        '200':
          description: Candidate confirmed; the updated mapping is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketProductIdentity'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /identity/reject:
    post:
      operationId: rejectIdentity
      tags:
        - identity
      summary: Reject a Needs Review candidate.
      description: >-
        Transitions a NeedsReview candidate to Rejected (journey 4 step 2). A
        rejected mapping never feeds an executable path and frees the variant for
        a fresh candidate later. The decision is recorded in an append-only audit.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityDecisionRequest'
      responses:
        '200':
          description: Candidate rejected; the updated mapping is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketProductIdentity'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /identity/defer:
    post:
      operationId: deferIdentity
      tags:
        - identity
      summary: Defer a Needs Review candidate, keeping it in the queue.
      description: >-
        Leaves a NeedsReview candidate in the queue (journey 4 step 2) and
        records the deferral in the append-only audit. It never promotes the
        mapping to an executable state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityDecisionRequest'
      responses:
        '200':
          description: Candidate deferred; the unchanged mapping is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketProductIdentity'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: mo_session
      description: >-
        Server-side session cookie (secure, httpOnly). The cookie carries an
        opaque session token; the authoritative session record lives in the
        database. No token ever lives in client-side storage (PRD §8, §12.3),
        and authorization is enforced server-side by the shared permission
        matrix — never inferred from the token itself.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Gateway bearer token. The LLM plane carries a read/Draft-only token
        (PRD §8); scope enforcement is server-side, never inferred from shape.

  schemas:
    Health:
      type: object
      description: Liveness plus build identity, returned by GET /healthz.
      required:
        - status
        - build
      properties:
        status:
          type: string
          description: Liveness marker; "ok" when the service is live.
          enum:
            - ok
        build:
          $ref: '#/components/schemas/BuildInfo'
      additionalProperties: false

    BuildInfo:
      type: object
      description: Identity of the running binary.
      required:
        - version
        - commit
        - buildTime
      properties:
        version:
          type: string
          description: Semantic version or dev marker of the running binary.
        commit:
          type: string
          description: VCS commit the binary was built from.
        buildTime:
          type: string
          description: Build timestamp (RFC 3339, UTC).
      additionalProperties: false

    ConnectorAccountRef:
      type: object
      description: References the marketplace account a connector operation targets.
      required:
        - marketplaceAccountId
      properties:
        marketplaceAccountId:
          type: string
          format: uuid
          description: Marketplace account (PRD §15.1) the operation applies to.
      additionalProperties: false

    ConnectorConnectRequest:
      type: object
      description: >-
        Connect request. The authorization code is the value DK redirects back
        after the seller approves access (Seller Academy token guide, §0.1). It
        is exchanged server-side for tokens and never persisted in plaintext.
      required:
        - marketplaceAccountId
        - authorizationCode
      properties:
        marketplaceAccountId:
          type: string
          format: uuid
          description: Marketplace account (PRD §15.1) to connect.
        authorizationCode:
          type: string
          minLength: 1
          description: One-time DK authorization code exchanged for tokens.
      additionalProperties: false

    ConnectorConnectionState:
      type: string
      description: Whether the DK connection is currently established.
      enum:
        - connected
        - disconnected

    ConnectorCapability:
      type: string
      description: >-
        The nine connector capabilities enumerated in PRD §15.2. Each is
        reported independently; the marketplace name never gates behavior.
      enum:
        - catalog_read
        - owned_offer_read
        - stock_read
        - buybox_read
        - boundary_read
        - commission_read
        - sales_context_read
        - price_write
        - change_feed

    ConnectorCapabilityState:
      type: string
      description: >-
        Capability status (PRD §15.2). Starts Unknown; becomes Supported only
        after a probe confirms behavior. Unknown never enables dependent UI.
      enum:
        - unknown
        - supported
        - unsupported
        - degraded

    CapabilityStatus:
      type: object
      description: One capability's current status and last-verified time (ACC-001).
      required:
        - capability
        - status
      properties:
        capability:
          $ref: '#/components/schemas/ConnectorCapability'
        status:
          $ref: '#/components/schemas/ConnectorCapabilityState'
        lastVerified:
          type: string
          format: date-time
          description: >-
            When a probe last set this status (RFC 3339, UTC). Absent until the
            first probe runs; a historical value never reads as current.
        detail:
          type: string
          description: >-
            Recovery-oriented reason for a non-Supported status (ACC-003).
            Free text only; carries no authority (PRD §8).
      additionalProperties: false

    ConnectorStatus:
      type: object
      description: >-
        Reconciled connection state plus every §15.2 capability. This is the
        single surface chat and screens read connector health from (ACC-001).
      required:
        - marketplaceAccountId
        - connectionState
        - capabilities
      properties:
        marketplaceAccountId:
          type: string
          format: uuid
        connectionState:
          $ref: '#/components/schemas/ConnectorConnectionState'
        capabilities:
          type: array
          description: All nine §15.2 capabilities, always present.
          items:
            $ref: '#/components/schemas/CapabilityStatus'
      additionalProperties: false

    UserRole:
      type: string
      description: >-
        Product role (PRD §2.2). Owner governs commercial boundaries and users;
        Operator executes day-to-day within Owner-defined permissions; Internal
        diagnoses data/execution and cannot change seller commercial rules.
      enum:
        - owner
        - operator
        - internal

    LoginRequest:
      type: object
      description: Email/password credential presented to open a session.
      required:
        - email
        - password
      properties:
        email:
          type: string
          minLength: 1
          description: Login identifier (the user's email).
        password:
          type: string
          minLength: 1
          description: >-
            Plaintext password, presented only over TLS and never stored;
            verified against the argon2id hash and discarded.
      additionalProperties: false

    SessionInfo:
      type: object
      description: >-
        Identity of the authenticated session. This is the single shape both
        chat and screens read the current principal from; role drives the shared
        permission matrix (ACC-002).
      required:
        - userId
        - organizationId
        - email
        - role
        - expiresAt
      properties:
        userId:
          type: string
          format: uuid
          description: The authenticated user (PRD §15.1).
        organizationId:
          type: string
          format: uuid
          description: The organization the user belongs to.
        email:
          type: string
          description: The user's email.
        role:
          $ref: '#/components/schemas/UserRole'
        expiresAt:
          type: string
          format: date-time
          description: When the session expires (RFC 3339, UTC).
      additionalProperties: false

    ChatTurnRequest:
      type: object
      description: >-
        One conversation turn from the browser. The message is free text and
        carries NO authority (PRD §8 free-text containment): it can never
        approve, execute, or confirm — those live only in structured controls
        outside the model plane. A turn optionally continues an existing
        conversation and/or binds a marketplace-account context; context
        resolution itself is deterministic in the LLM plane (§8.1), never guessed
        from this field.
      required:
        - message
      properties:
        conversationId:
          type: string
          format: uuid
          description: >-
            Existing conversation to continue. Absent on the first turn; the
            gateway opens a new conversation and returns its id in the stream.
        marketplaceAccountId:
          type: string
          format: uuid
          description: >-
            Optional account context for the turn. Exactly one context is active
            per conversation; ambiguity is resolved by a structured picker, never
            inferred (CHAT-007).
        message:
          type: string
          minLength: 1
          maxLength: 8000
          description: The user's free-text message. Bounded; carries no authority.
      additionalProperties: false

    ChatUnavailableReason:
      type: string
      description: >-
        Why chat is unavailable. All three degrade chat ONLY — every structured
        screen stays fully functional (CHAT-009). Never inferred; set by the
        gateway from the kill-switch config or LLM-plane reachability.
      enum:
        - kill_switch_global
        - kill_switch_account
        - provider_unavailable

    ChatUnavailable:
      type: object
      description: >-
        Structured disabled state for /chat. The web client renders the
        suggested-prompts + structured-screens fallback (§12.1) from this; it is
        NOT an error the way a 5xx failure is — screens remain fully usable.
      required:
        - code
        - message
        - reason
      properties:
        code:
          type: string
          description: Stable machine-readable code (screaming_snake_case).
        message:
          type: string
          description: Human-readable summary. Localized at the edge, never in core.
        reason:
          $ref: '#/components/schemas/ChatUnavailableReason'
      additionalProperties: false

    ChatStreamEvent:
      type: object
      description: >-
        The JSON payload carried in each SSE `data:` frame from /chat. Documented
        so every consumer (web, tests) decodes the same shape; the wire transport
        is text/event-stream, not a JSON response body. `kind` discriminates the
        frame; `token` carries incremental assistant text; `conversationId` is
        emitted once when a new conversation is opened; `envelope` carries the
        final typed response envelope on the `final` frame; `failure` carries the
        §12.4 structured failure state. No frame ever carries an approval control.
      required:
        - kind
      properties:
        kind:
          type: string
          description: Frame discriminator.
          enum:
            - conversation
            - token
            - final
            - failure
        conversationId:
          type: string
          format: uuid
          description: Emitted once on the `conversation` frame for a new conversation.
        token:
          type: string
          description: Incremental assistant text on a `token` frame.
        envelope:
          type: object
          description: >-
            The final typed response envelope on a `final` frame. Its internal
            shape (category-separated content, evidence, freshness) is owned and
            validated inside the LLM plane (§12.2) and lands with the response
            contract step; the gateway relays it verbatim.
          additionalProperties: true
        failure:
          $ref: '#/components/schemas/ChatFailure'
      additionalProperties: false

    ChatFailure:
      type: object
      description: >-
        The §12.4 structured failure state: after one automatic retry, a concise
        message plus a deep link to the structured screen. Free text only; no
        authority. Emitted as the `failure` frame, or when a hard bound (turn
        recursion limit, tool-call limit, timeout, token ceiling) is exceeded.
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable machine-readable failure code (screaming_snake_case).
        message:
          type: string
          description: Human-readable summary. Localized at the edge.
        deepLink:
          type: string
          description: Path to the structured screen that completes the task deterministically.
      additionalProperties: false

    MarketProductIdentityState:
      type: string
      description: >-
        Versioned Market Product Identity state (PRD §7.2 CAT-002). Only
        `confirmed` may drive an executable path; `needs_review`, `rejected`, and
        `obsolete` never can (identity quarantine).
      enum:
        - confirmed
        - needs_review
        - rejected
        - obsolete

    MarketProductIdentity:
      type: object
      description: >-
        A variant's mapping to a public DK product record, with its versioned
        state. Separate canonical entity from the owned Variant/Listing (CAT-001).
      required:
        - id
        - marketplaceAccountId
        - variantId
        - nativeVariantId
        - nativeProductId
        - state
        - active
        - candidateSource
        - version
      properties:
        id:
          type: string
          format: uuid
          description: Stable mapping id.
        marketplaceAccountId:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
          description: The owned variant this mapping resolves.
        nativeVariantId:
          type: integer
          format: int64
          description: DK native variant id (LTR technical identifier).
        nativeProductId:
          type: integer
          format: int64
          description: The public DK product record the variant is mapped to.
        state:
          $ref: '#/components/schemas/MarketProductIdentityState'
        active:
          type: boolean
          description: Whether this is the variant's live mapping.
        candidateSource:
          type: string
          description: How the candidate was created (P0 is exact_native_id only).
        version:
          type: integer
          description: Monotonic per-mapping version, bumped on every state transition.
      additionalProperties: false

    NeedsReviewItem:
      type: object
      description: >-
        One Needs Review queue row (journey 4 step 1): the pending candidate plus
        the SKU / variant title / product title / native-id evidence a reviewer
        needs to confirm, reject, or defer.
      required:
        - identityId
        - variantId
        - nativeVariantId
        - nativeProductId
        - supplierCode
        - variantTitle
        - productTitle
        - candidateSource
        - version
      properties:
        identityId:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
        nativeVariantId:
          type: integer
          format: int64
        nativeProductId:
          type: integer
          format: int64
        supplierCode:
          type: string
          description: Seller SKU / supplier code (LTR technical identifier).
        variantTitle:
          type: string
        productTitle:
          type: string
        candidateSource:
          type: string
        version:
          type: integer
      additionalProperties: false

    NeedsReviewQueue:
      type: object
      description: The account's pending Needs Review identity-mapping candidates.
      required:
        - items
      properties:
        items:
          type: array
          description: Pending candidates; empty when the queue is clear.
          items:
            $ref: '#/components/schemas/NeedsReviewItem'
      additionalProperties: false

    IdentityDecisionRequest:
      type: object
      description: >-
        A confirm / reject / defer decision on a Needs Review candidate. The
        optional note is free text captured as audit evidence; it carries NO
        authority (PRD §8): the structured operation itself is the decision.
      required:
        - identityId
      properties:
        identityId:
          type: string
          format: uuid
          description: The Market Product Identity to act on.
        note:
          type: string
          maxLength: 2000
          description: Optional reviewer note stored as append-only audit evidence.
      additionalProperties: false

    ErrorEnvelope:
      type: object
      description: >-
        Canonical error shape for every gateway endpoint. Free text lives in
        `message`/`detail` only and never carries authority (PRD §8 free-text
        containment); `code` is the stable machine-readable discriminator.
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable, machine-readable error code (screaming_snake_case).
        message:
          type: string
          description: Human-readable summary. Localized at the edge, never in core.
        detail:
          type: string
          description: Optional additional context for diagnostics.
        requestId:
          type: string
          description: Correlation id for tracing this request across planes.
      additionalProperties: false
