openapi: 3.1.0
info:
  title: Market-Ops Gateway API
  description: >-
    Internal gateway API for the DK Marketplace Intelligence platform. This
    document is the single source of truth for the gateway contract (plan
    §4.3): the Go server (`gen/go`), the TypeScript client (`gen/ts`), and the
    Python client (`gen/python`) are all generated from it and committed. It is
    the ONLY hand-edited contract artifact; evolution is additive within P0.
    Schemas are named after the PRD §15.1 canonical records; one tag per domain.
  version: 0.0.0
  contact:
    name: api_data_contracts

servers:
  - url: http://localhost:8080
    description: Local dev (core service)

# Bearer (JWT) auth applies to the whole surface by default. Operational probes
# such as /healthz opt out with an explicit empty `security: []`.
security:
  - bearerAuth: []

# One tag per PRD §15.1 canonical domain. These are placeholders in v0 — the
# operations that populate them land in later [C] steps. Keeping the tag set
# here fixes the naming vocabulary every plane generates against.
tags:
  - name: system
    description: Liveness and build identity (unauthenticated operational probes).
  - name: organization
    description: Organization / Marketplace Account — reconciled account and capability state.
  - name: product
    description: Product / Variant / Listing / Owned Offer — canonical owned state with native IDs.
  - name: identity
    description: Market Product Identity — versioned Confirmed/Needs Review/Rejected/Obsolete mapping.
  - name: observation
    description: Observation / Observed Offer — append-only evidence and its derived current view.
  - name: economics
    description: Cost Profile / Margin Snapshot — versioned economics.
  - name: event
    description: Market Event — lifecycle records.
  - name: recommendation
    description: Recommendation — versioned, expiring policy result.
  - name: approval
    description: Approval Card — versioned, expiring rendering of exact action parameters.
  - name: selection
    description: Selection Set — named, versioned bulk scope.
  - name: action
    description: Action — append-only attempt and state history.
  - name: outcome
    description: Outcome Window — append-only measured result and confidence.
  - name: conversation
    description: Conversation / Context / Message — retained interaction records.
  - name: investigation
    description: Saved Investigation — pinned conversation.
  - name: pilot
    description: Pilot Assortment — versioned beta measurement unit.
  - name: session
    description: >-
      Authentication and session identity. Login, logout, and current-session
      lookup for the Owner/Operator/Internal roles (PRD §2.2). Sessions are
      server-side, carried in a secure httpOnly cookie — never a token in
      client storage (PRD §8, §12.3). Authorization is enforced server-side by
      the single shared permission matrix (ACC-002); scope is never inferred
      from token shape.

paths:
  /healthz:
    get:
      operationId: getHealthz
      tags:
        - system
      summary: Liveness probe with build identity.
      description: >-
        Returns service liveness plus the running binary's build identity.
        Unauthenticated so orchestrators and load balancers can probe it.
      security: []
      responses:
        '200':
          description: The service is live.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /connector/connect:
    post:
      operationId: connectConnector
      tags:
        - organization
      summary: Connect the DK account for a marketplace account.
      description: >-
        Exchanges a DK authorization code for tokens (stored encrypted at rest),
        seeds every §15.2 capability at Unknown, and runs the capability probes.
        Returns the reconciled connection + capability status (ACC-001).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectorConnectRequest'
      responses:
        '200':
          description: Connection established; capability status returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorStatus'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /connector/refresh:
    post:
      operationId: refreshConnector
      tags:
        - organization
      summary: Refresh the DK access token and re-run capability probes.
      description: >-
        Rotates the access token via the stored refresh token (re-encrypted at
        rest) and re-probes every capability so status and last-verified time
        stay current (ACC-001, ACC-003).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectorAccountRef'
      responses:
        '200':
          description: Token refreshed; capability status returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorStatus'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /connector/status:
    get:
      operationId: getConnectorStatus
      tags:
        - organization
      summary: Inspect connection and per-capability status.
      description: >-
        Returns the current connection state plus every §15.2 capability with
        its status and last-verified time. Capabilities default to Unknown and
        never enable dependent UI while Unknown (ACC-001).
      parameters:
        - name: marketplaceAccountId
          in: query
          required: true
          description: Marketplace account whose connector status is requested.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Current connection and capability status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorStatus'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /connector/disconnect:
    post:
      operationId: disconnectConnector
      tags:
        - organization
      summary: Disconnect the DK account and purge stored tokens.
      description: >-
        Marks the connection disconnected, purges the encrypted tokens, and
        resets every capability to Unknown so no dependent logic can run on a
        severed connection (ACC-001).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectorAccountRef'
      responses:
        '200':
          description: Connection disconnected; capabilities reset to Unknown.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorStatus'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/login:
    post:
      operationId: login
      tags:
        - session
      summary: Authenticate a user and open a server-side session.
      description: >-
        Verifies the email/password credential (argon2id, verified in constant
        time) and, on success, opens a server-side session and returns the
        current session identity. The session token is delivered ONLY in a
        secure httpOnly cookie (PRD §8, §12.3); it never appears in the response
        body. Public: this is how an unauthenticated user obtains a session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: >-
            Authenticated; session opened. A Set-Cookie header carries the
            server-side session token (secure, httpOnly).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfo'
        '401':
          description: Invalid credentials (fail closed; no distinction leaks which field was wrong).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/me:
    get:
      operationId: getCurrentSession
      tags:
        - session
      summary: Return the identity of the current session.
      description: >-
        Returns the user, organization, role, and expiry of the session bound to
        the request cookie. Requires a valid session; fails closed with 401 when
        the cookie is absent, unknown, or expired.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current session identity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfo'
        '401':
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/logout:
    post:
      operationId: logout
      tags:
        - session
      summary: Close the current server-side session.
      description: >-
        Deletes the server-side session bound to the request cookie and clears
        the cookie. Idempotent: closing an already-absent session succeeds.
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Session closed; the session cookie is cleared.
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /chat:
    post:
      operationId: chat
      tags:
        - conversation
      summary: Converse with the LLM plane over a Server-Sent Events stream.
      description: >-
        Opens (or continues) a conversation turn and streams the LLM plane's
        response as Server-Sent Events (PRD §19.3: SSE, no WebSocket). The
        gateway authenticates the browser session (cookie), authorizes the read
        action through the single shared permission matrix, and proxies the turn
        to the internal Python LLM service; it never lets free text approve,
        execute, or confirm anything (PRD §8, §12.3 — the LLM plane holds a
        read/Draft-only credential and no model tool advances an action past
        Draft). When the global or per-account kill switch is on, or the LLM
        plane is unreachable, chat returns a structured unavailable state and
        NOTHING else degrades — every structured screen stays fully functional
        (CHAT-009).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatTurnRequest'
      responses:
        '200':
          description: >-
            An event stream of turn events (text/event-stream). Each SSE `data:`
            frame is a JSON ChatStreamEvent. The stream is grounded, read/Draft
            only, and carries no approval control.
          content:
            text/event-stream:
              schema:
                type: string
                description: >-
                  Raw SSE frames. Each frame's `data:` payload is a JSON-encoded
                  ChatStreamEvent (documented for consumers; the transport is a
                  byte stream, not a JSON body).
        '503':
          description: >-
            Chat is unavailable: the kill switch is on (global or per-account) or
            the LLM plane is unreachable. Screens are unaffected (CHAT-009).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatUnavailable'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /identity/needs-review:
    get:
      operationId: listNeedsReview
      tags:
        - identity
      summary: List the Needs Review identity-mapping queue for an account.
      description: >-
        Returns the account's pending Market Product Identity candidates
        (journey 4 step 1): each row carries SKU (supplier code), variant and
        product title, and the native-id evidence a reviewer needs. Only
        NeedsReview candidates appear here — Confirmed/Rejected/Obsolete mappings
        are never in the queue. Confirming a candidate is the ONLY thing that
        makes a variant an observation target (CAT-002, OBS-001).
      parameters:
        - name: marketplaceAccountId
          in: query
          required: true
          description: Marketplace account whose review queue is requested.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The pending Needs Review candidates for the account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeedsReviewQueue'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /identity/confirm:
    post:
      operationId: confirmIdentity
      tags:
        - identity
      summary: Confirm a Needs Review candidate as the variant's active mapping.
      description: >-
        Transitions a NeedsReview candidate to Confirmed (journey 4 step 2). At
        most one active Confirmed mapping may exist per variant (CAT-002,
        enforced by a partial unique index); a second confirm for the same
        variant is rejected. Only after confirmation does the variant become an
        observation target (OBS-001). The decision is recorded in an append-only
        audit (who/when/evidence).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityDecisionRequest'
      responses:
        '200':
          description: Candidate confirmed; the updated mapping is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketProductIdentity'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /identity/reject:
    post:
      operationId: rejectIdentity
      tags:
        - identity
      summary: Reject a Needs Review candidate.
      description: >-
        Transitions a NeedsReview candidate to Rejected (journey 4 step 2). A
        rejected mapping never feeds an executable path and frees the variant for
        a fresh candidate later. The decision is recorded in an append-only audit.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityDecisionRequest'
      responses:
        '200':
          description: Candidate rejected; the updated mapping is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketProductIdentity'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /identity/defer:
    post:
      operationId: deferIdentity
      tags:
        - identity
      summary: Defer a Needs Review candidate, keeping it in the queue.
      description: >-
        Leaves a NeedsReview candidate in the queue (journey 4 step 2) and
        records the deferral in the append-only audit. It never promotes the
        mapping to an executable state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityDecisionRequest'
      responses:
        '200':
          description: Candidate deferred; the unchanged mapping is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketProductIdentity'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /observation/targets:
    get:
      operationId: listObservationTargets
      tags:
        - observation
      summary: List the account's observation targets.
      description: >-
        Returns the account's active observation targets (PRD §7.3 OBS-001). A
        target exists ONLY for an active Confirmed Market Product Identity — an
        unconfirmed/NeedsReview/Rejected/Obsolete identity is never observable.
      parameters:
        - name: marketplaceAccountId
          in: query
          required: true
          description: Marketplace account whose targets are requested.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The account's active observation targets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservationTargetList'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /observation/observed-offers:
    get:
      operationId: listObservedOffers
      tags:
        - observation
      summary: List the account's derived current Observed Offers.
      description: >-
        Returns the derived CURRENT view of the observed market (PRD §7.3,
        §10.3): one Observed Offer per (target, offer identity), carrying its
        quality state, the raw price evidence (money quarantine — never a Money),
        the freshness deadline, and the corroborating route provenance. An expired
        offer is Stale and renders age-only; a disappeared offer is closed with an
        end time and is never a zero price (§16).
      parameters:
        - name: marketplaceAccountId
          in: query
          required: true
          description: Marketplace account whose observed offers are requested.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The account's current Observed Offers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservedOfferList'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /observation/observations:
    get:
      operationId: listObservations
      tags:
        - observation
      summary: List append-only observation evidence for a target.
      description: >-
        Returns the append-only observation evidence for one target, newest
        first (PRD §7.3 OBS-002/OBS-004). Historical values never silently become
        current: each row carries its captured time, quality, and freshness
        deadline so an expired value renders with age and cannot satisfy a
        current-data gate.
      parameters:
        - name: targetId
          in: query
          required: true
          description: The observation target whose evidence is requested.
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          description: Maximum rows to return (default 100, capped at 500).
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: The append-only observation evidence for the target.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservationList'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /observation/capture:
    post:
      operationId: uploadCapture
      tags:
        - observation
      summary: Upload an extension (Route B) observation capture.
      description: >-
        The server-side ingestion contract the Chrome extension calls into (PRD
        §10.1 Route B — corroboration / opportunistic refresh only). The request
        schema is ALLOW-LISTED (additionalProperties false): the extension may
        submit only Route B captures with the permitted fields, and may NOT
        self-certify schema/identity validity, conflict, or forge Route C
        freshness — those are server-side determinations. Price is raw evidence
        only (money quarantine); a capture never carries a Money. An equivalent
        replay is deduplicated (OBS-008): it creates no duplicate current offer and
        retains route provenance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureUpload'
      responses:
        '202':
          description: Capture accepted (or deduplicated) and reflected in the current view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureAccepted'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /cost/import/preview:
    post:
      operationId: previewCostImport
      tags:
        - cost
      summary: Build a CSV cost-import preview (no commit).
      description: >-
        Parses a UTF-8 cost CSV (Persian/Latin digits normalized, LOC-007),
        resolves SKUs, and returns a per-row disposition preview (CST-001). NO
        cost value is committed here — the returned batch is in 'preview' and must
        be confirmed via /cost/import/commit. Every non-accept row carries a
        stated reason; duplicate (SKU, component) rows are a 'duplicate' conflict
        that blocks commit until resolved (§16).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CostImportPreviewRequest'
      responses:
        '200':
          description: The preview batch with per-row dispositions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostImportPreview'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /cost/import:
    get:
      operationId: getCostImportPreview
      tags:
        - cost
      summary: Re-fetch a stored cost-import preview batch.
      description: >-
        Returns a previously created preview batch and its disposition rows
        (CST-001), e.g. to restore the preview after a reload before confirmation.
      parameters:
        - name: batchId
          in: query
          required: true
          description: The preview batch to fetch.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The preview batch with per-row dispositions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostImportPreview'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /cost/import/commit:
    post:
      operationId: commitCostImport
      tags:
        - cost
      summary: Commit a confirmed cost-import preview.
      description: >-
        Commits the ACCEPTED rows of a preview batch into append-only,
        component-versioned cost profiles (CST-001/CST-002) and recomputes margin
        readiness for every affected SKU. A batch that is not in 'preview', or
        that still has duplicate conflicts, is refused (§16 no-commit-until-
        resolved).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CostImportCommitRequest'
      responses:
        '200':
          description: The committed batch and the affected SKUs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostImportCommitResult'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /cost/value:
    post:
      operationId: enterSingleCost
      tags:
        - cost
      summary: Record a single cost-component value.
      description: >-
        Records ONE component value for a SKU as a new append-only cost-profile
        version and recomputes readiness (CST-002/CST-003). Used by the guided
        cost-blocker flow. The value is parsed to an exact integer money amount
        (no float, §9.1); the raw entered text/unit is preserved as evidence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SingleCostEntryRequest'
      responses:
        '200':
          description: The newly recorded cost-profile version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostProfileVersion'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /cost/profiles:
    get:
      operationId: listCostProfiles
      tags:
        - cost
      summary: List the in-force cost-profile versions for a SKU at a time.
      description: >-
        Returns the EXACT in-force version of each cost component for a variant at
        `asOf` (CST-002 point-in-time lookup). Omitting `asOf` returns the current
        in-force versions. This reproduces the cost profile that produced a
        historical number, never the current one.
      parameters:
        - name: variantId
          in: query
          required: true
          description: The variant (SKU) whose cost profile is requested.
          schema:
            type: string
            format: uuid
        - name: asOf
          in: query
          required: false
          description: Point-in-time instant (RFC 3339). Defaults to now.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: The in-force cost-profile versions per component.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostProfileList'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /cost/readiness:
    get:
      operationId: getMarginReadiness
      tags:
        - cost
      summary: Read a SKU's margin readiness.
      description: >-
        Returns the derived margin readiness for a variant (CST-003): one of
        Complete, Partial, Stale, Missing, with the components that block or limit
        it. Only Complete drives an executable recommendation (enforced
        downstream); Partial may show analysis but no approval control.
      parameters:
        - name: variantId
          in: query
          required: true
          description: The variant (SKU) whose readiness is requested.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The SKU's margin readiness.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarginReadiness'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /policy/simulate:
    post:
      operationId: simulatePolicy
      tags:
        - economics
      summary: Simulate the contribution + six-stage policy engines (non-executable).
      description: >-
        Runs the deterministic contribution model (§9.2) and the fixed six-stage
        policy order (§9.3: boundary → hard floor → movement cap → cooldown →
        strategy → objective) over fully-specified what-if inputs, and returns the
        proposed price with its contribution OR the typed blockers in policy order.
        This is a SIMULATION: the result is always labelled non-executable and
        carries NO approval control (`approvable` is always false). Free text /
        simulations never approve (§8, §12.3, never-cut). A loose movement cap or
        cooldown (PRC-004) is rejected with a structured error. Authoritative
        numbers come only from these engines — never from the model plane (§12.3).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicySimulationRequest'
      responses:
        '200':
          description: The simulated contribution and policy result (non-executable).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicySimulationResult'
        default:
          description: Unexpected error (including a rejected loose cap/cooldown, PRC-004).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: mo_session
      description: >-
        Server-side session cookie (secure, httpOnly). The cookie carries an
        opaque session token; the authoritative session record lives in the
        database. No token ever lives in client-side storage (PRD §8, §12.3),
        and authorization is enforced server-side by the shared permission
        matrix — never inferred from the token itself.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Gateway bearer token. The LLM plane carries a read/Draft-only token
        (PRD §8); scope enforcement is server-side, never inferred from shape.

  schemas:
    Health:
      type: object
      description: Liveness plus build identity, returned by GET /healthz.
      required:
        - status
        - build
      properties:
        status:
          type: string
          description: Liveness marker; "ok" when the service is live.
          enum:
            - ok
        build:
          $ref: '#/components/schemas/BuildInfo'
      additionalProperties: false

    BuildInfo:
      type: object
      description: Identity of the running binary.
      required:
        - version
        - commit
        - buildTime
      properties:
        version:
          type: string
          description: Semantic version or dev marker of the running binary.
        commit:
          type: string
          description: VCS commit the binary was built from.
        buildTime:
          type: string
          description: Build timestamp (RFC 3339, UTC).
      additionalProperties: false

    ConnectorAccountRef:
      type: object
      description: References the marketplace account a connector operation targets.
      required:
        - marketplaceAccountId
      properties:
        marketplaceAccountId:
          type: string
          format: uuid
          description: Marketplace account (PRD §15.1) the operation applies to.
      additionalProperties: false

    ConnectorConnectRequest:
      type: object
      description: >-
        Connect request. The authorization code is the value DK redirects back
        after the seller approves access (Seller Academy token guide, §0.1). It
        is exchanged server-side for tokens and never persisted in plaintext.
      required:
        - marketplaceAccountId
        - authorizationCode
      properties:
        marketplaceAccountId:
          type: string
          format: uuid
          description: Marketplace account (PRD §15.1) to connect.
        authorizationCode:
          type: string
          minLength: 1
          description: One-time DK authorization code exchanged for tokens.
      additionalProperties: false

    ConnectorConnectionState:
      type: string
      description: Whether the DK connection is currently established.
      enum:
        - connected
        - disconnected

    ConnectorCapability:
      type: string
      description: >-
        The nine connector capabilities enumerated in PRD §15.2. Each is
        reported independently; the marketplace name never gates behavior.
      enum:
        - catalog_read
        - owned_offer_read
        - stock_read
        - buybox_read
        - boundary_read
        - commission_read
        - sales_context_read
        - price_write
        - change_feed

    ConnectorCapabilityState:
      type: string
      description: >-
        Capability status (PRD §15.2). Starts Unknown; becomes Supported only
        after a probe confirms behavior. Unknown never enables dependent UI.
      enum:
        - unknown
        - supported
        - unsupported
        - degraded

    CapabilityStatus:
      type: object
      description: One capability's current status and last-verified time (ACC-001).
      required:
        - capability
        - status
      properties:
        capability:
          $ref: '#/components/schemas/ConnectorCapability'
        status:
          $ref: '#/components/schemas/ConnectorCapabilityState'
        lastVerified:
          type: string
          format: date-time
          description: >-
            When a probe last set this status (RFC 3339, UTC). Absent until the
            first probe runs; a historical value never reads as current.
        detail:
          type: string
          description: >-
            Recovery-oriented reason for a non-Supported status (ACC-003).
            Free text only; carries no authority (PRD §8).
      additionalProperties: false

    ConnectorStatus:
      type: object
      description: >-
        Reconciled connection state plus every §15.2 capability. This is the
        single surface chat and screens read connector health from (ACC-001).
      required:
        - marketplaceAccountId
        - connectionState
        - capabilities
      properties:
        marketplaceAccountId:
          type: string
          format: uuid
        connectionState:
          $ref: '#/components/schemas/ConnectorConnectionState'
        capabilities:
          type: array
          description: All nine §15.2 capabilities, always present.
          items:
            $ref: '#/components/schemas/CapabilityStatus'
      additionalProperties: false

    UserRole:
      type: string
      description: >-
        Product role (PRD §2.2). Owner governs commercial boundaries and users;
        Operator executes day-to-day within Owner-defined permissions; Internal
        diagnoses data/execution and cannot change seller commercial rules.
      enum:
        - owner
        - operator
        - internal

    LoginRequest:
      type: object
      description: Email/password credential presented to open a session.
      required:
        - email
        - password
      properties:
        email:
          type: string
          minLength: 1
          description: Login identifier (the user's email).
        password:
          type: string
          minLength: 1
          description: >-
            Plaintext password, presented only over TLS and never stored;
            verified against the argon2id hash and discarded.
      additionalProperties: false

    SessionInfo:
      type: object
      description: >-
        Identity of the authenticated session. This is the single shape both
        chat and screens read the current principal from; role drives the shared
        permission matrix (ACC-002).
      required:
        - userId
        - organizationId
        - email
        - role
        - expiresAt
      properties:
        userId:
          type: string
          format: uuid
          description: The authenticated user (PRD §15.1).
        organizationId:
          type: string
          format: uuid
          description: The organization the user belongs to.
        email:
          type: string
          description: The user's email.
        role:
          $ref: '#/components/schemas/UserRole'
        expiresAt:
          type: string
          format: date-time
          description: When the session expires (RFC 3339, UTC).
      additionalProperties: false

    ChatTurnRequest:
      type: object
      description: >-
        One conversation turn from the browser. The message is free text and
        carries NO authority (PRD §8 free-text containment): it can never
        approve, execute, or confirm — those live only in structured controls
        outside the model plane. A turn optionally continues an existing
        conversation and/or binds a marketplace-account context; context
        resolution itself is deterministic in the LLM plane (§8.1), never guessed
        from this field.
      required:
        - message
      properties:
        conversationId:
          type: string
          format: uuid
          description: >-
            Existing conversation to continue. Absent on the first turn; the
            gateway opens a new conversation and returns its id in the stream.
        marketplaceAccountId:
          type: string
          format: uuid
          description: >-
            Optional account context for the turn. Exactly one context is active
            per conversation; ambiguity is resolved by a structured picker, never
            inferred (CHAT-007).
        message:
          type: string
          minLength: 1
          maxLength: 8000
          description: The user's free-text message. Bounded; carries no authority.
      additionalProperties: false

    ChatUnavailableReason:
      type: string
      description: >-
        Why chat is unavailable. All three degrade chat ONLY — every structured
        screen stays fully functional (CHAT-009). Never inferred; set by the
        gateway from the kill-switch config or LLM-plane reachability.
      enum:
        - kill_switch_global
        - kill_switch_account
        - provider_unavailable

    ChatUnavailable:
      type: object
      description: >-
        Structured disabled state for /chat. The web client renders the
        suggested-prompts + structured-screens fallback (§12.1) from this; it is
        NOT an error the way a 5xx failure is — screens remain fully usable.
      required:
        - code
        - message
        - reason
      properties:
        code:
          type: string
          description: Stable machine-readable code (screaming_snake_case).
        message:
          type: string
          description: Human-readable summary. Localized at the edge, never in core.
        reason:
          $ref: '#/components/schemas/ChatUnavailableReason'
      additionalProperties: false

    ChatStreamEvent:
      type: object
      description: >-
        The JSON payload carried in each SSE `data:` frame from /chat. Documented
        so every consumer (web, tests) decodes the same shape; the wire transport
        is text/event-stream, not a JSON response body. `kind` discriminates the
        frame; `token` carries incremental assistant text; `conversationId` is
        emitted once when a new conversation is opened; `envelope` carries the
        final typed response envelope on the `final` frame; `failure` carries the
        §12.4 structured failure state. No frame ever carries an approval control.
      required:
        - kind
      properties:
        kind:
          type: string
          description: Frame discriminator.
          enum:
            - conversation
            - token
            - final
            - failure
        conversationId:
          type: string
          format: uuid
          description: Emitted once on the `conversation` frame for a new conversation.
        token:
          type: string
          description: Incremental assistant text on a `token` frame.
        envelope:
          type: object
          description: >-
            The final typed response envelope on a `final` frame. Its internal
            shape (category-separated content, evidence, freshness) is owned and
            validated inside the LLM plane (§12.2) and lands with the response
            contract step; the gateway relays it verbatim.
          additionalProperties: true
        failure:
          $ref: '#/components/schemas/ChatFailure'
      additionalProperties: false

    ChatFailure:
      type: object
      description: >-
        The §12.4 structured failure state: after one automatic retry, a concise
        message plus a deep link to the structured screen. Free text only; no
        authority. Emitted as the `failure` frame, or when a hard bound (turn
        recursion limit, tool-call limit, timeout, token ceiling) is exceeded.
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable machine-readable failure code (screaming_snake_case).
        message:
          type: string
          description: Human-readable summary. Localized at the edge.
        deepLink:
          type: string
          description: Path to the structured screen that completes the task deterministically.
      additionalProperties: false

    MarketProductIdentityState:
      type: string
      description: >-
        Versioned Market Product Identity state (PRD §7.2 CAT-002). Only
        `confirmed` may drive an executable path; `needs_review`, `rejected`, and
        `obsolete` never can (identity quarantine).
      enum:
        - confirmed
        - needs_review
        - rejected
        - obsolete

    MarketProductIdentity:
      type: object
      description: >-
        A variant's mapping to a public DK product record, with its versioned
        state. Separate canonical entity from the owned Variant/Listing (CAT-001).
      required:
        - id
        - marketplaceAccountId
        - variantId
        - nativeVariantId
        - nativeProductId
        - state
        - active
        - candidateSource
        - version
      properties:
        id:
          type: string
          format: uuid
          description: Stable mapping id.
        marketplaceAccountId:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
          description: The owned variant this mapping resolves.
        nativeVariantId:
          type: integer
          format: int64
          description: DK native variant id (LTR technical identifier).
        nativeProductId:
          type: integer
          format: int64
          description: The public DK product record the variant is mapped to.
        state:
          $ref: '#/components/schemas/MarketProductIdentityState'
        active:
          type: boolean
          description: Whether this is the variant's live mapping.
        candidateSource:
          type: string
          description: How the candidate was created (P0 is exact_native_id only).
        version:
          type: integer
          description: Monotonic per-mapping version, bumped on every state transition.
      additionalProperties: false

    NeedsReviewItem:
      type: object
      description: >-
        One Needs Review queue row (journey 4 step 1): the pending candidate plus
        the SKU / variant title / product title / native-id evidence a reviewer
        needs to confirm, reject, or defer.
      required:
        - identityId
        - variantId
        - nativeVariantId
        - nativeProductId
        - supplierCode
        - variantTitle
        - productTitle
        - candidateSource
        - version
      properties:
        identityId:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
        nativeVariantId:
          type: integer
          format: int64
        nativeProductId:
          type: integer
          format: int64
        supplierCode:
          type: string
          description: Seller SKU / supplier code (LTR technical identifier).
        variantTitle:
          type: string
        productTitle:
          type: string
        candidateSource:
          type: string
        version:
          type: integer
      additionalProperties: false

    NeedsReviewQueue:
      type: object
      description: The account's pending Needs Review identity-mapping candidates.
      required:
        - items
      properties:
        items:
          type: array
          description: Pending candidates; empty when the queue is clear.
          items:
            $ref: '#/components/schemas/NeedsReviewItem'
      additionalProperties: false

    IdentityDecisionRequest:
      type: object
      description: >-
        A confirm / reject / defer decision on a Needs Review candidate. The
        optional note is free text captured as audit evidence; it carries NO
        authority (PRD §8): the structured operation itself is the decision.
      required:
        - identityId
      properties:
        identityId:
          type: string
          format: uuid
          description: The Market Product Identity to act on.
        note:
          type: string
          maxLength: 2000
          description: Optional reviewer note stored as append-only audit evidence.
      additionalProperties: false

    QualityState:
      type: string
      description: >-
        The SIX evidence-quality states (PRD §10.3, OBS-003). The set is closed;
        each state has a fixed display/recommend/execute consequence. An expired
        value is `stale` and can never satisfy a current-data gate (OBS-004).
      enum:
        - verified
        - supported
        - unverified
        - conflicted
        - stale
        - unavailable

    ObservationRoute:
      type: string
      description: >-
        Capture route provenance (PRD §10.1). route_a official connector, route_b
        extension (corroboration only), route_c server observation.
      enum:
        - route_a
        - route_b
        - route_c

    AvailabilityStatus:
      type: string
      description: >-
        Normalized availability (docs/11, §16). `unavailable` is the DISTINCT
        temporary-out state; `disappeared` is the permanent close (offer gone,
        closed with an end time, never a zero price).
      enum:
        - in_stock
        - out_of_stock
        - limited
        - unavailable
        - disappeared

    RawAmount:
      type: object
      description: >-
        Raw marketplace price evidence (PRD §9.1 money quarantine). Preserved
        verbatim and NEVER promoted to Money: no currency, no exponent, no
        conversion. The source unit is validation-gated (Gate 0a) and unknown; an
        absent unit token stays quarantined, never inferred.
      required:
        - text
        - value
        - unit
      properties:
        text:
          type: string
          description: The amount exactly as captured, before any normalization.
        value:
          type: string
          description: The parsed numeric token as raw source text (never a number type).
        unit:
          type: string
          description: The source unit token as captured; not interpreted as ISO-4217.
      additionalProperties: false

    ObservationTarget:
      type: object
      description: >-
        An observation target (PRD §7.3 OBS-001): the executable observation unit
        for one variant, existing ONLY for an active Confirmed identity.
      required:
        - id
        - marketplaceAccountId
        - identityId
        - variantId
        - nativeVariantId
        - nativeProductId
        - tier
        - cadenceSeconds
        - freshnessDeadlineSeconds
        - active
      properties:
        id:
          type: string
          format: uuid
        marketplaceAccountId:
          type: string
          format: uuid
        identityId:
          type: string
          format: uuid
          description: The active Confirmed Market Product Identity being observed.
        variantId:
          type: string
          format: uuid
        nativeVariantId:
          type: integer
          format: int64
        nativeProductId:
          type: integer
          format: int64
        tier:
          type: string
          description: Cadence/freshness tier (priority 60 min, standard 6 h, background 24 h).
          enum:
            - priority
            - standard
            - background
        cadenceSeconds:
          type: integer
          description: Observation cadence for the tier, in seconds.
        freshnessDeadlineSeconds:
          type: integer
          description: Freshness window for the tier, in seconds.
        active:
          type: boolean
      additionalProperties: false

    ObservationTargetList:
      type: object
      description: The account's active observation targets.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ObservationTarget'
      additionalProperties: false

    ObservedOffer:
      type: object
      description: >-
        A derived CURRENT Observed Offer (PRD §7.3, §10.3): the latest accepted
        observation's fields, quality, freshness deadline, and corroborating route
        provenance. Price is raw evidence only. When `endedAt` is set the offer has
        disappeared and is closed (§16) — the last raw price is retained, never
        zeroed.
      required:
        - id
        - targetId
        - marketplaceAccountId
        - offerIdentity
        - nativeVariantId
        - price
        - listPrice
        - availabilityStatus
        - quality
        - capturedAt
        - freshnessDeadline
        - routes
      properties:
        id:
          type: string
          format: uuid
        targetId:
          type: string
          format: uuid
        marketplaceAccountId:
          type: string
          format: uuid
        offerIdentity:
          type: string
          description: Canonical per-offer key (native variant id + seller); LTR-isolated.
        nativeVariantId:
          type: integer
          format: int64
        nativeSellerId:
          type: string
        price:
          $ref: '#/components/schemas/RawAmount'
        listPrice:
          $ref: '#/components/schemas/RawAmount'
        availabilityStatus:
          $ref: '#/components/schemas/AvailabilityStatus'
        stockSignal:
          type: integer
          format: int64
          nullable: true
          description: Optional observed stock signal; null when DK omits it.
        quality:
          $ref: '#/components/schemas/QualityState'
        capturedAt:
          type: string
          format: date-time
          description: Capture time of the current observation (UTC).
        freshnessDeadline:
          type: string
          format: date-time
          description: When this value expires; past it the offer is Stale (OBS-004).
        routes:
          type: array
          description: The routes corroborating the current value (provenance, OBS-008).
          items:
            $ref: '#/components/schemas/ObservationRoute'
        endedAt:
          type: string
          format: date-time
          nullable: true
          description: Offer-disappearance close time (§16); null while live.
      additionalProperties: false

    ObservedOfferList:
      type: object
      description: The account's current Observed Offers.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ObservedOffer'
      additionalProperties: false

    Observation:
      type: object
      description: >-
        One append-only observation evidence row (PRD §7.3 OBS-002). Carries the
        full evidence envelope; historical rows never silently become current.
      required:
        - id
        - targetId
        - marketplaceAccountId
        - offerIdentity
        - route
        - parserVersion
        - sourceType
        - evidenceRef
        - price
        - availabilityStatus
        - quality
        - capturedAt
        - freshnessDeadline
      properties:
        id:
          type: string
          format: uuid
        targetId:
          type: string
          format: uuid
        marketplaceAccountId:
          type: string
          format: uuid
        nativeVariantId:
          type: integer
          format: int64
        nativeSellerId:
          type: string
        offerIdentity:
          type: string
        route:
          $ref: '#/components/schemas/ObservationRoute'
        subRoute:
          type: string
        parserVersion:
          type: string
        connectorVersion:
          type: string
        sourceUrl:
          type: string
        sourceType:
          type: string
        evidenceRef:
          type: string
        price:
          $ref: '#/components/schemas/RawAmount'
        listPrice:
          $ref: '#/components/schemas/RawAmount'
        availabilityStatus:
          $ref: '#/components/schemas/AvailabilityStatus'
        stockSignal:
          type: integer
          format: int64
          nullable: true
        quality:
          $ref: '#/components/schemas/QualityState'
        capturedAt:
          type: string
          format: date-time
        freshnessDeadline:
          type: string
          format: date-time
      additionalProperties: false

    ObservationList:
      type: object
      description: Append-only observation evidence for a target, newest first.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Observation'
      additionalProperties: false

    CaptureUpload:
      type: object
      description: >-
        ALLOW-LISTED extension (Route B) capture upload (PRD §10.1). Only these
        fields are accepted (additionalProperties false). The extension cannot
        assert schema/identity validity or conflict, cannot forge Route C, and
        cannot declare a permanent disappearance — those are server-side. Price is
        raw evidence only (money quarantine).
      required:
        - marketplaceAccountId
        - targetId
        - nativeVariantId
        - subRoute
        - sourceType
        - parserVersion
        - evidenceRef
        - availabilityStatus
        - capturedAt
        - confidence
      properties:
        marketplaceAccountId:
          type: string
          format: uuid
        targetId:
          type: string
          format: uuid
          description: The confirmed-identity observation target this capture is for.
        nativeVariantId:
          type: integer
          format: int64
        nativeSellerId:
          type: string
        subRoute:
          type: string
          description: Route B sub-route (PRD §7.3 OBS-005).
          enum:
            - passive
            - on_demand
            - watchlist
        sourceType:
          type: string
          description: How the extension captured the value.
          enum:
            - public-web-endpoint
            - embedded-json
            - dom
            - user-triggered-request
        sourceUrl:
          type: string
        parserVersion:
          type: string
          minLength: 1
        connectorVersion:
          type: string
        evidenceRef:
          type: string
          minLength: 1
        rawFixtureRef:
          type: string
        price:
          $ref: '#/components/schemas/RawAmount'
        listPrice:
          $ref: '#/components/schemas/RawAmount'
        availabilityStatus:
          type: string
          description: Extension-observable availability; disappearance close is server-side.
          enum:
            - in_stock
            - out_of_stock
            - limited
            - unavailable
        stockSignal:
          type: integer
          format: int64
          nullable: true
        capturedAt:
          type: string
          format: date-time
        confidence:
          type: string
          description: Capture parser/unit confidence (docs/08).
          enum:
            - verified
            - partially_verified
            - unverified
      additionalProperties: false

    CaptureAccepted:
      type: object
      description: >-
        Result of a capture upload. `deduped` marks an equivalent replay that
        created no duplicate current offer while retaining provenance (OBS-008).
      required:
        - deduped
        - quality
      properties:
        deduped:
          type: boolean
        observationId:
          type: string
          format: uuid
          nullable: true
          description: The append-only evidence row id; null when deduped.
        quality:
          $ref: '#/components/schemas/QualityState'
      additionalProperties: false

    CostComponent:
      type: string
      description: >-
        A cost component of the §9.2 contribution model. The set is closed. COGS
        and commission are always required; fulfillment/shipping/promotion are
        required when applicable to the listing; packaging/ads/returns are optional
        in P0 (an account policy may still require them).
      enum:
        - cogs
        - commission
        - fulfillment
        - shipping
        - packaging
        - promotion
        - ads
        - returns

    CostImportDisposition:
      type: string
      description: >-
        The outcome of a preview row (CST-001, §16). `accept` will commit;
        `reject` cannot commit and carries a reason; `duplicate` is a (SKU,
        component) conflict within the file that blocks commit until resolved.
      enum:
        - accept
        - reject
        - duplicate

    MarginReadinessState:
      type: string
      description: >-
        The four closed margin-readiness states (CST-003). Only `complete` may
        drive an executable recommendation; `partial` may show analysis but no
        approval control; `stale` and `missing` block.
      enum:
        - complete
        - partial
        - stale
        - missing

    MoneyAmount:
      type: object
      description: >-
        An exact monetary amount as the (mantissa, currency, exponent) triple
        (PRD §9.1). Value = mantissa × 10^exponent currency units. There is NO
        float: mantissa is an exact integer. A cost amount is representable because
        the account's entry currency is known; it stays excluded from executable
        paths until S16+S35.
      required:
        - mantissa
        - currency
        - exponent
      properties:
        mantissa:
          type: integer
          format: int64
          description: Exact integer mantissa.
        currency:
          type: string
          description: ISO-4217 currency code.
        exponent:
          type: integer
          description: Base-10 exponent applied to the mantissa.
      additionalProperties: false

    ColumnComponentMapping:
      type: object
      description: Maps one CSV header column to the cost component it supplies.
      required:
        - header
        - component
      properties:
        header:
          type: string
          description: The CSV header text of the column.
        component:
          $ref: '#/components/schemas/CostComponent'
      additionalProperties: false

    DetectedMapping:
      type: object
      description: >-
        How the import interpreted the CSV columns, echoed for the seller to
        confirm the mapping (CST-001 mapping preview).
      required:
        - skuColumn
        - componentColumns
      properties:
        skuColumn:
          type: string
          description: The header text detected/used as the SKU column.
        componentColumns:
          type: array
          items:
            $ref: '#/components/schemas/ColumnComponentMapping'
      additionalProperties: false

    CostImportPreviewRequest:
      type: object
      description: >-
        Request to build a CSV cost-import preview. `csv` is the UTF-8 file
        content. An explicit column mapping is optional; when omitted the columns
        are auto-detected from the header row.
      required:
        - marketplaceAccountId
        - csv
      properties:
        marketplaceAccountId:
          type: string
          format: uuid
          description: The account the costs belong to.
        filename:
          type: string
          description: Original file name, for the audit/preview display.
        csv:
          type: string
          description: The UTF-8 CSV content.
        skuColumn:
          type: string
          description: Explicit SKU column header (optional; auto-detected when omitted).
        componentColumns:
          type: array
          description: Explicit component column mapping (optional; auto-detected when omitted).
          items:
            $ref: '#/components/schemas/ColumnComponentMapping'
      additionalProperties: false

    CostImportCounts:
      type: object
      description: Disposition tally backing the preview cards and the commit guard.
      required:
        - accept
        - reject
        - duplicate
      properties:
        accept:
          type: integer
        reject:
          type: integer
        duplicate:
          type: integer
      additionalProperties: false

    CostImportRow:
      type: object
      description: >-
        One preview row: raw evidence, resolution, the parsed amount (when
        acceptable), and the disposition + reason (CST-001).
      required:
        - rowNumber
        - sku
        - component
        - rawValue
        - normalizedValue
        - disposition
        - reason
      properties:
        rowNumber:
          type: integer
          description: 1-based data-row number in the file.
        sku:
          type: string
          description: The raw SKU token from the file (LTR-isolated identifier).
        component:
          $ref: '#/components/schemas/CostComponent'
        rawValue:
          type: string
          description: The value cell exactly as entered.
        normalizedValue:
          type: string
          description: The digit-normalized numeric token (LOC-007).
        variantId:
          type: string
          format: uuid
          nullable: true
          description: The resolved variant; null when the SKU did not resolve.
        amount:
          allOf:
            - $ref: '#/components/schemas/MoneyAmount'
          nullable: true
          description: The parsed amount; null when the row is not an accept.
        disposition:
          $ref: '#/components/schemas/CostImportDisposition'
        reason:
          type: string
          description: Stable machine reason for a non-accept row; empty for accept.
      additionalProperties: false

    CostImportPreview:
      type: object
      description: A preview batch (status 'preview') with its per-row dispositions.
      required:
        - batchId
        - marketplaceAccountId
        - status
        - counts
        - rows
      properties:
        batchId:
          type: string
          format: uuid
        marketplaceAccountId:
          type: string
          format: uuid
        filename:
          type: string
        status:
          type: string
          enum:
            - preview
            - committed
            - cancelled
        counts:
          $ref: '#/components/schemas/CostImportCounts'
        detected:
          $ref: '#/components/schemas/DetectedMapping'
        rows:
          type: array
          items:
            $ref: '#/components/schemas/CostImportRow'
      additionalProperties: false

    CostImportCommitRequest:
      type: object
      description: Confirm and commit a preview batch (CST-001).
      required:
        - batchId
      properties:
        batchId:
          type: string
          format: uuid
      additionalProperties: false

    CostImportCommitResult:
      type: object
      description: Result of committing a preview batch.
      required:
        - batchId
        - status
        - committedRows
        - affectedVariantIds
      properties:
        batchId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - committed
        committedRows:
          type: integer
          description: Number of accepted rows committed as cost-profile versions.
        affectedVariantIds:
          type: array
          items:
            type: string
            format: uuid
      additionalProperties: false

    SingleCostEntryRequest:
      type: object
      description: >-
        Record one cost-component value for a SKU (CST-002). effectiveFrom
        defaults to now; staleAfter is an optional review-by instant.
      required:
        - marketplaceAccountId
        - variantId
        - component
        - rawValue
      properties:
        marketplaceAccountId:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
        component:
          $ref: '#/components/schemas/CostComponent'
        rawValue:
          type: string
          description: The value as entered (Persian/Latin digits normalized, LOC-007).
        rawUnit:
          type: string
          description: The unit as entered, preserved verbatim as evidence.
        effectiveFrom:
          type: string
          format: date-time
          description: When this version takes effect (RFC 3339). Defaults to now.
        staleAfter:
          type: string
          format: date-time
          nullable: true
          description: Optional review-by instant; past ⇒ the value is stale for readiness.
      additionalProperties: false

    CostProfileVersion:
      type: object
      description: >-
        One append-only, effective-dated cost-profile version for a component
        (CST-002). The exact version in force at a time reproduces a historical
        number.
      required:
        - id
        - marketplaceAccountId
        - variantId
        - component
        - version
        - amount
        - effectiveFrom
        - source
      properties:
        id:
          type: string
          format: uuid
        marketplaceAccountId:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
        component:
          $ref: '#/components/schemas/CostComponent'
        version:
          type: integer
          description: Monotonic version per (variant, component).
        amount:
          $ref: '#/components/schemas/MoneyAmount'
        rawText:
          type: string
        rawValue:
          type: string
        rawUnit:
          type: string
        effectiveFrom:
          type: string
          format: date-time
        staleAfter:
          type: string
          format: date-time
          nullable: true
        source:
          type: string
          enum:
            - csv_import
            - single_value
            - connector
      additionalProperties: false

    CostProfileList:
      type: object
      description: The in-force cost-profile version per component at a point in time.
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CostProfileVersion'
      additionalProperties: false

    MarginReadiness:
      type: object
      description: >-
        Derived margin readiness for a SKU (CST-003). Only `complete` drives an
        executable recommendation.
      required:
        - variantId
        - marketplaceAccountId
        - state
        - missingComponents
        - staleComponents
        - computedAt
      properties:
        variantId:
          type: string
          format: uuid
        marketplaceAccountId:
          type: string
          format: uuid
        state:
          $ref: '#/components/schemas/MarginReadinessState'
        missingComponents:
          type: array
          items:
            $ref: '#/components/schemas/CostComponent'
        staleComponents:
          type: array
          items:
            $ref: '#/components/schemas/CostComponent'
        computedAt:
          type: string
          format: date-time
      additionalProperties: false

    ContributionComponentKind:
      type: string
      description: >-
        Whether a contribution component is an absolute money amount or a
        fixed-point basis-point rate applied to the rate base (§9.2). Both stay in
        exact money arithmetic — there is no float (§9.1).
      enum:
        - absolute
        - rate

    ContributionComponentInput:
      type: object
      description: >-
        One §9.2 deduction with its cost-profile provenance. Exactly one of
        `amount` (kind `absolute`) or `rateBasisPoints` (kind `rate`) is
        meaningful. `version` is the cost-profile component version (CST-002) that
        produced the value, carried so a historical contribution reproduces the
        exact inputs.
      required:
        - component
        - kind
      properties:
        component:
          $ref: '#/components/schemas/CostComponent'
        kind:
          $ref: '#/components/schemas/ContributionComponentKind'
        amount:
          $ref: '#/components/schemas/MoneyAmount'
        rateBasisPoints:
          type: integer
          format: int64
          description: Fixed-point rate in ten-thousandths (1200 = 12%), for kind `rate`.
        version:
          type: integer
          format: int64
          description: Cost-profile component version id (CST-002); 0 for synthetic input.
      additionalProperties: false

    ContributionDeduction:
      type: object
      description: One resolved subtraction in the contribution breakdown (PRC-001 inputs).
      required:
        - component
        - amount
        - kind
        - version
      properties:
        component:
          $ref: '#/components/schemas/CostComponent'
        amount:
          $ref: '#/components/schemas/MoneyAmount'
        kind:
          $ref: '#/components/schemas/ContributionComponentKind'
        version:
          type: integer
          format: int64
      additionalProperties: false

    Contribution:
      type: object
      description: >-
        The deterministic §9.2 contribution: the exact amount, its breakdown, the
        readiness that governs executability (only Complete is executable), and the
        versioned rounding-rule identifier that produced it (reproducible per
        CST-002).
      required:
        - amount
        - netProceeds
        - deductions
        - readiness
        - executable
        - roundingRule
      properties:
        amount:
          $ref: '#/components/schemas/MoneyAmount'
        netProceeds:
          $ref: '#/components/schemas/MoneyAmount'
        deductions:
          type: array
          items:
            $ref: '#/components/schemas/ContributionDeduction'
        readiness:
          $ref: '#/components/schemas/MarginReadinessState'
        executable:
          type: boolean
          description: True only when readiness is Complete (§9.2 / CST-003).
        roundingRule:
          type: string
          description: Versioned rounding-rule identifier applied to any rate.
      additionalProperties: false

    PolicyStrategy:
      type: string
      description: The selected pricing strategy (stage 5, §9.3). Closed set for P0.
      enum:
        - hold
        - match
        - undercut

    PolicyObjective:
      type: string
      description: The optimization objective (stage 6, §9.3).
      enum:
        - maximize_contribution
        - track_strategy

    PolicyStage:
      type: string
      description: >-
        One of the six ordered policy stages (§9.3). The order is fixed;
        `stageOrder` on a blocker carries the numeric precedence.
      enum:
        - boundary
        - hard_floor
        - movement_cap
        - cooldown
        - strategy
        - objective

    PolicyBlockerCode:
      type: string
      description: >-
        Stable, machine-readable reason a policy stage blocked. Free text lives
        only in a blocker's message and carries no authority (§8).
      enum:
        - boundary_unknown
        - boundary_invalid
        - contribution_below_floor
        - contribution_crosses_zero
        - movement_cap_infeasible
        - cooldown_active
        - strategy_disabled
        - objective_infeasible

    PolicyBoundary:
      type: object
      description: >-
        The marketplace price boundary (stage 1, §9.2). `known` false is an UNKNOWN
        boundary and blocks (§16). Min/Max are required when known.
      required:
        - known
      properties:
        known:
          type: boolean
        min:
          $ref: '#/components/schemas/MoneyAmount'
        max:
          $ref: '#/components/schemas/MoneyAmount'
      additionalProperties: false

    PolicyConfig:
      type: object
      description: >-
        The policy configuration for a simulation. `movementCapBasisPoints` and
        `cooldownSeconds` are optional; omitting them uses the §9.3 defaults (5%,
        60m). A looser value (a larger cap or shorter cooldown) is rejected
        (PRC-004).
      required:
        - boundary
        - contributionFloor
        - strategy
        - strategyEnabled
        - objective
      properties:
        boundary:
          $ref: '#/components/schemas/PolicyBoundary'
        contributionFloor:
          $ref: '#/components/schemas/MoneyAmount'
        movementCapBasisPoints:
          type: integer
          format: int64
          description: Maximum price movement in basis points (≤ 500; default 500).
        cooldownSeconds:
          type: integer
          format: int64
          description: Minimum interval between actions in seconds (≥ 3600; default 3600).
        strategy:
          $ref: '#/components/schemas/PolicyStrategy'
        strategyEnabled:
          type: boolean
        reference:
          $ref: '#/components/schemas/MoneyAmount'
        undercutBasisPoints:
          type: integer
          format: int64
          description: Undercut depth in basis points for the `undercut` strategy.
        objective:
          $ref: '#/components/schemas/PolicyObjective'
      additionalProperties: false

    PolicyBlocker:
      type: object
      description: One typed reason a policy stage prevented a proposal (in policy order).
      required:
        - stage
        - stageOrder
        - code
        - message
      properties:
        stage:
          $ref: '#/components/schemas/PolicyStage'
        stageOrder:
          type: integer
          description: Numeric precedence (0 = boundary … 5 = objective).
        code:
          $ref: '#/components/schemas/PolicyBlockerCode'
        message:
          type: string
          description: Human-readable, non-authoritative detail (localized at the edge).
      additionalProperties: false

    PolicyProposal:
      type: object
      description: >-
        An accepted policy result: a proposed price and its contribution. Present
        only when every hard stage passed and the contribution is strictly
        positive. It is NOT an approval control.
      required:
        - price
        - contribution
      properties:
        price:
          $ref: '#/components/schemas/MoneyAmount'
        contribution:
          $ref: '#/components/schemas/MoneyAmount'
      additionalProperties: false

    PolicySimulationRequest:
      type: object
      description: >-
        A fully-specified what-if for the contribution + policy engines. All money
        must share one currency and exponent (§9.1). Contribution is evaluated as a
        function of price: at any candidate price the net seller proceeds and the
        commission rate base are that price (the P0 owned-offer model), so the
        policy stages see a contribution that varies with price. `nowRfc3339` and
        `lastActionAt` drive the cooldown stage; omit `lastActionAt` when there is
        no prior action.
      required:
        - currentPrice
        - components
        - readiness
        - config
      properties:
        variantId:
          type: string
          format: uuid
          description: Optional SKU the what-if is about (provenance only).
        currentPrice:
          $ref: '#/components/schemas/MoneyAmount'
        components:
          type: array
          items:
            $ref: '#/components/schemas/ContributionComponentInput'
        readiness:
          $ref: '#/components/schemas/MarginReadinessState'
        config:
          $ref: '#/components/schemas/PolicyConfig'
        nowRfc3339:
          type: string
          format: date-time
          description: Evaluation instant (defaults to server now).
        lastActionAt:
          type: string
          format: date-time
          description: Instant of the last price action, for the cooldown stage.
      additionalProperties: false

    PolicySimulationResult:
      type: object
      description: >-
        The simulated contribution and policy result. `simulation` is always true
        and `approvable` is always false: a simulation NEVER carries an approval
        control (§8, §12.3, never-cut). `proposal` is present only when the policy
        stages accepted a price; otherwise `blockers` lists the typed reasons in
        policy order.
      required:
        - simulation
        - approvable
        - contribution
        - blockers
      properties:
        simulation:
          type: boolean
          description: Always true — this result is non-executable.
        approvable:
          type: boolean
          description: Always false — a simulation carries no approval control.
        contribution:
          $ref: '#/components/schemas/Contribution'
        proposal:
          $ref: '#/components/schemas/PolicyProposal'
        blockers:
          type: array
          items:
            $ref: '#/components/schemas/PolicyBlocker'
      additionalProperties: false

    ErrorEnvelope:
      type: object
      description: >-
        Canonical error shape for every gateway endpoint. Free text lives in
        `message`/`detail` only and never carries authority (PRD §8 free-text
        containment); `code` is the stable machine-readable discriminator.
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable, machine-readable error code (screaming_snake_case).
        message:
          type: string
          description: Human-readable summary. Localized at the edge, never in core.
        detail:
          type: string
          description: Optional additional context for diagnostics.
        requestId:
          type: string
          description: Correlation id for tracing this request across planes.
      additionalProperties: false
