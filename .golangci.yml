version: "2"

# golangci-lint config for services/core (run per module with GOWORK=off).
# Generated code under gen/ is excluded. The forbidigo money/float rules below
# encode the PRD §9.1 static guard; internal/{money,margin,policy,approval} do
# not exist yet in S1, so they are inert today. S5 lands the money package and
# S7 adds a semgrep rule as a second layer. Import-boundary (depguard) rules are
# added alongside the packages they constrain in later steps.

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - forbidigo
    - depguard
  settings:
    forbidigo:
      # PRD §9.1 static guard, forbidigo layer. This linter matches forbidden
      # identifiers/calls; it cannot match binary operators, so the "no raw
      # integer arithmetic" half of the guard is enforced by the semgrep second
      # layer (tools/semgrep/money.yml, run via `task lint:money`). forbidigo
      # here owns the "no float on any money path" half.
      #
      # Kept repo-wide and conservative in P0; non-money code that legitimately
      # needs floats gets a scoped exclusion when it appears.
      forbid:
        # No floating-point value enters a money path (PRD §9.1): ban the float
        # types outright...
        - pattern: '^float(32|64)$'
          msg: "no floating point on money-adjacent paths (PRD §9.1); use Money/basis points"
        # ...and the arbitrary-precision *float* constructors, which would smuggle
        # non-integer money math past the int-type ban. Integer big.Int math is
        # still allowed (money uses it for exact rate application).
        - pattern: '^big\.NewFloat$'
          msg: "no floating point on money paths (PRD §9.1); use big.Int / basis points"
        - pattern: '^big\.ParseFloat$'
          msg: "no floating point on money paths (PRD §9.1); use big.Int / basis points"
        - pattern: '^strconv\.ParseFloat$'
          msg: "no floating point on money paths (PRD §9.1); parse to integer minor units"
    depguard:
      # Import-boundary rules (dk-p0-monorepo.md §5). The referenced packages
      # (gen/go, internal/money) land in later steps; these rules are inert until
      # then, then enforce the boundary automatically. Do not weaken.
      rules:
        # Only internal/httpapi may import the generated gen/go gateway
        # (dk-p0-monorepo.md §5). Tightened in S4: the /healthz wiring lives in
        # internal/httpapi and the command layer passes a transport-boundary
        # BuildInfo, so cmd/** no longer needs (or gets) a gen/go exclusion.
        gen-go-boundary:
          list-mode: lax
          files:
            - '!**/services/core/internal/httpapi/**'
          deny:
            - pkg: github.com/mhosseinab/market-ops/gen/go
              desc: only internal/httpapi may import gen/go (dk-p0-monorepo.md §5)
        # Only internal/connector may import the generated DK Seller client
        # gen/dkgo (dk-p0-monorepo.md §5). internal/connector lands in a later
        # step; this rule is inert until then, then enforces the boundary.
        gen-dkgo-boundary:
          list-mode: lax
          files:
            - '!**/services/core/internal/connector/**'
          deny:
            - pkg: github.com/mhosseinab/market-ops/gen/dkgo
              desc: only internal/connector may import gen/dkgo (dk-p0-monorepo.md §5)
        # internal/money imports no internal packages (PRD §9.1; S5+).
        money-isolation:
          list-mode: lax
          files:
            - '**/services/core/internal/money/**'
          deny:
            - pkg: github.com/mhosseinab/market-ops/services/core/internal
              desc: internal/money imports no internal packages (money isolation, PRD §9.1)
  exclusions:
    generated: lax
    paths:
      - gen

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - gen
