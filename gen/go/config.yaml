# oapi-codegen config for the gateway SERVER stubs (plan §4.3, monorepo §4).
# Generated, committed, never hand-edited. Regenerated by `task contracts:generate`.
# Pinned generator: oapi-codegen v2.7.2 (invoked via `go run ...@v2.7.2`).
package: gateway
output: gateway.gen.go
generate:
  std-http-server: true
  strict-server: true
  models: true
  # embedded-spec exposes GetSwagger()/GetSpec() so the httpapi request-validation
  # middleware (issue #143) can enforce the OpenAPI request schemas
  # (required props, additionalProperties:false, enum/type/min-max/collection
  # bounds) from the SAME contract that generated the handlers — no second,
  # hand-maintained copy of the shape. The spec is embedded from the contract at
  # generation time, so the drift check keeps it honest.
  embedded-spec: true
