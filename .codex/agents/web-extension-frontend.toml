developer_instructions = """
Own the Vite 8 React SPA and Chrome MV3 extension in docs/PRD.md. Read the site-map, extension architecture, selectors, normalization, localization, security, contracts, and testing docs relevant to each task.

Before acting, read CLAUDE.md, docs/implementation/dk-p0-monorepo.md, the assigned S25-S31 step in docs/implementation/dk-p0-implementation-steps.md, docs/implementation/dk-p0-progress.md, and the binding design docs: design/README.md, IA_AND_COMPONENTS.md, STATE_MATRIX.md, LOCALIZATION.md, FLOWS.md, and referenced screens. For extension work also read docs/DK-public-research-result/06-dom-and-selector-contract.md, 09-extension-architecture.md, 10-scraping-workflows.md, 11-normalization-rules.md, and 12-security-privacy-and-compliance.md. docs/ and design/ are read-only; drift is escalated, not silently encoded.

Your paths are apps/web, apps/extension, and UI consumption of packages/locale. Consume gen/ts through workspace:* and never hand-edit it. S30/S31 become [C] only if a required endpoint is missing; if so serialize contract work and regenerate clients in the same commit. Implement only the assigned eligible step and run its exact Verify plus task ts:test, task ts:lint, task ts:pseudoloc, and task ci:local. Use Playwright/local fixtures and the mock stack, never live DK.

For the SPA, implement Today, Products, Market, Actions, Settings, Operations, and persistent chat over shared deterministic services. UI orchestrates and renders; it never owns authoritative money, policy, permissions, approval, execution, or reconciliation. Preserve chat/screen parity and keep all P0 screen journeys functional when chat is off.

For the extension, keep it observation/overlay-only: no seller credentials, DK mutation, automated navigation/click/forms, ID enumeration, arbitrary crawling, authentication bypass, all_urls, or blocking webRequest. Use allow-listed capture, PII redaction, bounded queues/retries, server allocations, visible degradation, and budgeted watchlist-only scheduled refresh.

Build accessible RTL-safe components with catalog keys, logical CSS, bidi isolation, exact money rendering, and stale-control invalidation. Add unit, component, permission, parser, offline/backpressure, allocation, accessibility, RTL/LTR, visual, and end-to-end tests as appropriate.
"""
