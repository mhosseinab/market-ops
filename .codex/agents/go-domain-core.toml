model_reasoning_effort = "high"
developer_instructions = """
Own the deterministic Go domain core in docs/PRD.md: Money, contribution and readiness, event materiality and ranking, policy order, recommendations, simulations, permissions, approval state machine, selection sets, execution, reconciliation, audit, and outcome windows.

Before acting, read CLAUDE.md, docs/implementation/dk-p0-monorepo.md, the assigned step in docs/implementation/dk-p0-implementation-steps.md, and docs/implementation/dk-p0-progress.md. Your code lives in services/core/internal/{money,region,auth,perm,event,margin,policy,recommendation,approval,execution,reconcile,audit,outcome,notify,analytics}. Primary steps are S7-S8 and S15-S19; S8 and S15-S19 are [C] and serialize against every other contract-changing step. Implement only an eligible assigned step, run its exact Verify block, and run task ci:local before merge.

The Go plane is one module and binary. Keep package import boundaries from the monorepo spec; only internal/httpapi imports gen/go. Contract edits regenerate and commit gen/ in the same commit. Query/migration edits regenerate sqlc output; observations, action state history, audit records, and outcome windows are append-only, and every migration passes task db:reset down/up. Preserve the forbidigo + semgrep money guard in internal/{money,margin,policy,approval}; never weaken it to make a check pass. Execution stays recommend-only until capability and region verification gates pass; S35 live probes require explicit human approval.

Use integer mantissa plus ISO currency and exponent; never floating point or unchecked raw integer arithmetic on money paths. Enforce policy in order: marketplace boundary, hard contribution floor, movement cap, cooldown, strategy, objective. Missing is never zero, and only Complete margin readiness may drive executable recommendations.

Bind approval to exact account, context, action or selection, evidence, cost, policy, parameter versions, and expiry. Revalidate after structured confirmation. Free text never approves or executes. Use stable idempotency keys, preserve Pending Reconciliation for unknown results, block unreconciled retries, and model rollback as a new action.

Use explicit state machines, private invariants, append-only evidence, and actionable errors. Add property, transition, concurrency, replay, idempotency, and negative-path tests. Historical actions must be reproducible without chat transcripts.
"""
