name: ci

# Affected-only, per-language CI (monorepo §7). A `detect` job computes path
# filters with dorny/paths-filter; each language job runs only when its filter
# matched. A contracts change cascades to all four planes. `task ci:local`
# mirrors these commands, in order, for the pre-merge loop.
#
# NOTE: first-run-on-GitHub is a DEFERRED gate — CI cannot execute from the
# build environment (Docker/Actions egress-blocked). Offline verification is
# `task ci:local` + `actionlint`.

on:
  push:
    # dk-p0/main is the orchestrated run's integration branch; main is trunk
    # once the long-lived dk-p0/main → main PR lands (dk-p0-agent-guidelines.md
    # branch conventions). Both are "push CI" (merges/direct updates), as
    # opposed to pull_request CI below (feature PRs targeting dk-p0/main).
    branches: [main, dk-p0/main]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect:
    name: detect affected planes
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
      go: ${{ steps.filter.outputs.go }}
      py: ${{ steps.filter.outputs.py }}
      ts: ${{ steps.filter.outputs.ts }}
      deploy: ${{ steps.filter.outputs.deploy }}
      ledger: ${{ steps.filter.outputs.ledger }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            contracts:
              - 'contracts/**'
              - 'docs/DK Marketplace - Open API Service.yml'
              - 'Taskfile.yml'
              - 'Taskfile.contracts.yml'
              - '.github/workflows/**'
            go:
              - 'services/core/**'
              - 'gen/go/**'
              - 'gen/dkgo/**'
              - 'contracts/**'
              - 'Taskfile.yml'
              - 'Taskfile.go.yml'
              - 'tools/dev/**'
              - '.golangci.yml'
              - 'tools/semgrep/**'
              - '.github/workflows/**'
            py:
              - 'services/llm/**'
              - 'gen/python/**'
              - 'contracts/**'
              - 'Taskfile.yml'
              - 'Taskfile.py.yml'
              - 'tools/dev/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/**'
            ts:
              - 'apps/**'
              - 'packages/**'
              - 'gen/ts/**'
              - 'contracts/**'
              - 'Taskfile.yml'
              - 'Taskfile.ts.yml'
              - 'tools/dev/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'biome.json'
              - '.github/workflows/**'
            deploy:
              - 'deploy/**'
              - 'runbooks/**'
              - 'tools/obs/**'
              - 'tools/integration/**'
              - 'Taskfile.yml'
              - '.github/workflows/**'
            ledger:
              - 'docs/implementation/dk-p0-progress.md'
              - 'tools/ledger/**'
              - 'Taskfile.yml'
              - '.github/workflows/**'
            workflow:
              - '.github/workflows/**'

  workflow-lint:
    name: workflow syntax and expressions
    needs: detect
    if: ${{ needs.detect.outputs.workflow == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: services/core/go.mod
          cache: false
      - name: actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

  contracts:
    name: contracts drift
    needs: detect
    if: ${{ needs.detect.outputs.contracts == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: install Task
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://taskfile.dev/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-go@v7
        with:
          go-version-file: services/core/go.mod
          cache-dependency-path: services/core/go.sum
      - uses: pnpm/action-setup@v6
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: pnpm
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      # Hermetic regression test for the drift gate's state detection (issue #3):
      # proves it catches unstaged, staged/cached, AND untracked changes.
      - run: task contracts:drift:test
      # Regenerate every gen/ artifact from its contract source, then fail if the
      # committed tree drifted. drift-check.sh checks unstaged + staged + untracked
      # changes under contracts/ and gen/ (task contracts:drift = generate + detect).
      - run: task contracts:drift

  go:
    name: go
    needs: detect
    if: ${{ needs.detect.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    # GOWORK=off on EVERY step — the go.work file never exists in CI; module
    # `replace` directives are what make cross-module builds resolve (monorepo §10).
    # `off` is quoted so YAML does not coerce it to the boolean false.
    env:
      GOWORK: "off"
      DATABASE_URL: postgres://market_ops:market_ops@localhost:5432/market_ops?sslmode=disable
      GOBIN: ${{ github.workspace }}/.cache/go-tools/bin
      GOLANGCI_LINT_VERSION: v2.12.2
      GOOSE_VERSION: v3.27.2
      RIVER_VERSION: v0.40.0
    services:
      # Scratch Postgres for the goose up/down assertion and any DB-touching tests.
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: market_ops
          POSTGRES_PASSWORD: market_ops
          POSTGRES_DB: market_ops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U market_ops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - name: install Task
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://taskfile.dev/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-go@v7
        id: setup-go
        with:
          go-version-file: services/core/go.mod
          cache-dependency-path: services/core/go.sum
      # Install the linter through its official action. It owns binary and lint
      # caching and avoids rebuilding or relying on a mutable shell installer.
      - name: install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-only: true
      - name: install sqlc
        uses: sqlc-dev/setup-sqlc@v3
        with:
          sqlc-version: '1.31.1'
      # setup-go caches GOMODCACHE/GOCACHE but not installed binaries, so keep a
      # separate exact-version cache for migration and job-queue CLIs.
      # No restore-keys: a tool-version change must produce a cold miss.
      - name: configure Go CLI path
        run: |
          mkdir -p "$GOBIN"
          echo "$GOBIN" >> "$GITHUB_PATH"
      - name: restore Go CLI cache
        id: go-tools-cache
        uses: actions/cache@v6
        with:
          path: ${{ env.GOBIN }}
          key: go-tools-${{ runner.os }}-${{ runner.arch }}-go-${{ steps.setup-go.outputs.go-version }}-goose-${{ env.GOOSE_VERSION }}-river-${{ env.RIVER_VERSION }}
      - name: install missing Go CLIs
        run: |
          install_go_cli() {
            binary="$1"
            package="$2"
            version="$3"
            if [ -x "$GOBIN/$binary" ]; then
              echo "$binary restored from cache"
              return
            fi
            echo "installing $binary $version"
            go install "${package}@${version}"
          }

          install_go_cli goose github.com/pressly/goose/v3/cmd/goose "$GOOSE_VERSION"
          install_go_cli river github.com/riverqueue/river/cmd/river "$RIVER_VERSION"
      - name: golangci-lint
        run: task go:lint
      # Apply the full schema to the fresh postgres:18 service container BEFORE
      # go:test, exactly as `task db:reset` does locally: DROP/CREATE via the
      # `postgres` maintenance DB + goose up (0001–0005) + River migrate-up +
      # seed fixtures. Without this, DB-backed tests hit a schemaless DB and fail
      # with `relation "organizations" does not exist`. The DATABASE_URL role
      # (market_ops) is the container superuser, so DROP/CREATE DATABASE succeeds.
      - name: apply schema to service container (db:reset)
        run: task db:reset
      - name: go test -race
        run: task go:test
      - name: migration up/down/up reversibility (scratch postgres:18)
        run: task migrate:verify

  money-guard:
    name: money guard (semgrep)
    needs: detect
    # Money paths (internal/{money,margin,policy,approval}) live under
    # services/core, so the `go` filter covers them. forbidigo (run by the go
    # job) cannot match binary operators, so this semgrep pass is the ONLY layer
    # catching raw integer arithmetic on money paths — it MUST run whenever core
    # changes (PRD §9.1 / §4.6, a never-cut invariant).
    if: ${{ needs.detect.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: install Task
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://taskfile.dev/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      # Pin semgrep to the version the local money guard was validated against
      # (matches the `task doctor` toolchain). uv tool installs a shim on PATH.
      - name: install semgrep
        run: |
          uv tool install semgrep==1.170.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      # Fail-closed money static guard: bans raw integer arithmetic + float on
      # the money paths (task lint:money → semgrep --config tools/semgrep/money.yml).
      - name: money static guard
        run: task lint:money

  py:
    name: py
    needs: detect
    if: ${{ needs.detect.outputs.py == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: install Task
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://taskfile.dev/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen --group dev
      # ruff + mypy (mypy is invoked from the repo root, whole packages — §10).
      - run: task py:lint
      - run: task py:test

  deploy-obs:
    name: deploy · observability artifacts
    needs: detect
    if: ${{ needs.detect.outputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: install Task
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://taskfile.dev/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      # The PromQL parser and the alert-rule YAML parser are REQUIRED validators,
      # not optional (issue #156): the gate parses every dashboard/alert expression
      # for real and FAILS CLOSED if a validator is unavailable. Pinned exact
      # versions; NO `|| true` — an install failure fails the job so a broken gate
      # can never merge behind green.
      - name: install required validators
        run: pip install "promql-parser==0.10.0" "PyYAML==6.0.3"
      # §18 dashboard JSON drift + PromQL/series + §20.1 alert-rule/runbook checks.
      - run: task obs:validate
      # Docker-free guard that the S32 integration entrypoints never destroy a
      # developer's fixed deploy/.env (issue #166). No Docker/DB needed — the
      # compose-based integration suite itself still runs push-only.
      - name: verify integration scripts preserve deploy/.env
        run: bash tools/integration/env_preservation_test.sh

  ledger-integrity:
    name: ledger integrity (verification-gate)
    needs: detect
    # Runs whenever the authoritative progress ledger, the validator + its
    # fixtures/tests, its Taskfile wiring, or the workflow changes (issue #203).
    # Before #203 a ledger-only or validator-only PR completed with only `detect`
    # and NO ledger-integrity check, so a malformed/weakened ledger could merge
    # green. This job is the remote enforcement point for the never-cut
    # ledger-integrity rule (issue #19): a step may be `passed` — and satisfy a
    # dependency gate — only after every MANDATORY verification has a successful
    # evidence record.
    if: ${{ needs.detect.outputs.ledger == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      # Regression suite FIRST: the RED fixture (S2 `passed` + pending-mandatory)
      # MUST be rejected and the GREEN fixture MUST be accepted, proving the
      # validator itself still fails closed. The validator is stdlib-only, so no
      # dependency install is needed. NO `|| true` — either command's non-zero
      # exit fails the job (fail-closed).
      - name: ledger validator regression suite (negative + positive fixtures)
        run: bash tools/ledger/validate_ledger_test.sh
      # Then validate the REAL checked-out ledger. A `passed` step whose exact
      # Verify block is still a pending mandatory gate — or any unclassified
      # deferred bullet — makes this exit non-zero and fails the merge.
      - name: validate the real progress ledger
        run: python3 tools/ledger/validate_ledger.py --file docs/implementation/dk-p0-progress.md

  ts:
    name: ts
    needs: detect
    if: ${{ needs.detect.outputs.ts == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: install Task
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://taskfile.dev/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: pnpm/action-setup@v6
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: verify clean-environment task up defaults
        run: bash tools/dev/up_test.sh
      - name: verify db:reset fail-closed safety guard
        run: bash tools/dev/db_reset_guard_test.sh
      # biome + per-member typecheck, then vitest, then the web + extension builds.
      - run: task ts:lint
      - run: task ts:test
      - run: task ts:build
      # The pseudo-locale merge gate now includes a browser layout pass
      # (task ts:pseudoloc → pseudoloc:visual, issue #15): it renders the real
      # shell under the pseudo pack in Chromium and fails on overflow, clipped
      # copy, or direction regressions jsdom cannot see. Install the browser here
      # (mirrors the integration job); the served harness uses MSW, no core stack.
      - name: install Chromium for the pseudo-locale visual gate
        run: pnpm --filter @market-ops/web exec playwright install --with-deps chromium
      # Pseudo-locale + copy-lint merge gate (LOC-011), live from S25.
      - run: task ts:pseudoloc

  integration:
    name: integration (S32 cross-plane suite)
    # Compose-based: core + llm + web + mockdk + postgres (deploy/compose.test.yml).
    # Runs ONLY on push (merges/direct updates to dk-p0/main or main) — never on
    # a feature PR — per dk-p0-monorepo.md §7 and the S32 step's Verify block.
    # Independent of `detect`: it exercises the WHOLE cross-plane stack
    # regardless of which single plane changed, so it does not gate on a path
    # filter the way the per-language jobs do.
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: install Task
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://taskfile.dev/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-go@v7
        with:
          go-version-file: services/core/go.mod
          cache-dependency-path: services/core/go.sum
      - uses: pnpm/action-setup@v6
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: pnpm
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: uv sync --frozen --group dev
      # Chromium is required for the kill-switch journey's Playwright run.
      - run: pnpm --filter web exec playwright install --with-deps chromium
      # --- S32 in-container Go + uv cache -------------------------------------
      # The compose stack builds core/mockdk + installs goose/river with `go`, and
      # runs `uv sync`, INSIDE stock golang/python containers whose caches are
      # thrown away by the `down -v` between the suite's three stack bring-ups —
      # ~66% of this job is that repeated compile/download (see run 29774545327).
      # deploy/compose.test.cache.yml bind-mounts a SHARED host cache into those
      # containers; we point run_all.sh (and its child journeys) at it and persist
      # the host dirs across runs with actions/cache. Kept under RUNNER_TEMP —
      # OUTSIDE the repo checkout — so the git-clean / contracts-drift gates never
      # see them. Exported via $GITHUB_ENV so the task→run_all.sh→child chain and
      # the `docker compose` interpolation all inherit the same paths.
      - name: point the integration stack at a shared host-side Go + uv cache
        run: |
          echo "MARKET_OPS_COMPOSE_EXTRA_FILE=deploy/compose.test.cache.yml" >> "$GITHUB_ENV"
          echo "MARKET_OPS_GO_CACHE_DIR=${RUNNER_TEMP}/int-gocache" >> "$GITHUB_ENV"
          echo "MARKET_OPS_UV_CACHE_DIR=${RUNNER_TEMP}/int-uvcache" >> "$GITHUB_ENV"
          mkdir -p "${RUNNER_TEMP}/int-gocache/mod" "${RUNNER_TEMP}/int-gocache/build" "${RUNNER_TEMP}/int-uvcache"
      - name: restore the integration Go build + module cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/int-gocache
          key: int-gocache-${{ runner.os }}-${{ hashFiles('services/core/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            int-gocache-${{ runner.os }}-${{ hashFiles('services/core/go.sum') }}-
            int-gocache-${{ runner.os }}-
      - name: restore the integration uv cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/int-uvcache
          key: int-uvcache-${{ runner.os }}-${{ hashFiles('uv.lock') }}-${{ github.run_id }}
          restore-keys: |
            int-uvcache-${{ runner.os }}-${{ hashFiles('uv.lock') }}-
            int-uvcache-${{ runner.os }}-
      # SEEDE2E_PASSWORD is test-only infrastructure (services/core/cmd/seede2e) —
      # never a production credential; generated fresh per run.
      - name: generate a test-run owner password
        run: echo "SEEDE2E_PASSWORD=int-$(openssl rand -hex 16)" >> "$GITHUB_ENV"
      - name: task test:integration
        env:
          GOWORK: "off"
        run: task test:integration
      # Persist the warmed caches for the next run. `if: always()` so a failing
      # scenario still banks the (valid, content-hashed) Go build cache. The
      # containers write as root, so hand ownership back before actions/cache tars
      # the tree. run_id in the save key ⇒ a fresh entry each run (the restore-keys
      # above pick the newest match); GitHub LRU-evicts old entries under the cap.
      - name: reclaim ownership of the container-written caches
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" "${RUNNER_TEMP}/int-gocache" "${RUNNER_TEMP}/int-uvcache" || true
      - name: save the integration Go build + module cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/int-gocache
          key: int-gocache-${{ runner.os }}-${{ hashFiles('services/core/go.sum') }}-${{ github.run_id }}
      - name: save the integration uv cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/int-uvcache
          key: int-uvcache-${{ runner.os }}-${{ hashFiles('uv.lock') }}-${{ github.run_id }}
