# deploy/grafana/provisioning/datasources/datasources.yaml
# Auto-provisioned Grafana datasources for the dev stack (PRD §19.3).
# Grafana loads everything under /etc/grafana/provisioning at startup.

apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    jsonData:
      # Correlate a trace's log lines through the shared Loki datasource.
      tracesToLogsV2:
        datasourceUid: loki

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: false

  # Metrics datasource for the §18 dashboards. Scrapes the OTLP metrics the Go
  # core and LLM plane emit (via the collector's prometheus exporter). Default so
  # a dashboard panel without an explicit datasource resolves to metrics.
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
