# deploy/otel-collector/config.yaml — dev OpenTelemetry collector (PRD §19.3).
#
# One OTLP ingest for every plane (Go core, Python LLM, web). Traces fan out to
# Tempo, logs to Loki via their native OTLP endpoints. A debug exporter mirrors
# both so the collector's own stdout is useful during local development.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Traces → Tempo (OTLP/gRPC, in-cluster, TLS off for dev).
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # Logs → Loki native OTLP ingest endpoint.
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
  # Metrics → a Prometheus scrape endpoint the dev Prometheus polls. The §18
  # dashboards query these series through the Grafana Prometheus datasource.
  #
  # add_metric_suffixes:false keeps the OTLP names stable through the OTLP→Prom
  # translation: only `.`→`_` is applied (no `_total`/`_seconds` suffixes), so a
  # counter `execution.write_attempts` becomes exactly `execution_write_attempts`
  # and the dashboards/alert-rules query the real emitted names. Histograms still
  # expand to `_bucket`/`_sum`/`_count` per the Prometheus data model.
  # resource_to_telemetry_conversion promotes service.name → a `service_name`
  # label so metrics roll up by service/version (docs/14).
  prometheus:
    endpoint: 0.0.0.0:8889
    add_metric_suffixes: false
    resource_to_telemetry_conversion:
      enabled: true
  debug:
    verbosity: normal

service:
  # The collector's OWN internal telemetry. The 0.119.0 image defaults this
  # metrics listener to localhost:8888 (feature gate
  # telemetry.UseLocalHostAsDefaultMetricsAddress), reachable only inside this
  # container — so the advertised otel-collector-internal Prometheus job stays
  # DOWN and queue depth / dropped spans / exporter failures are invisible
  # (issue #153). Bind it to 0.0.0.0:8888 so the Prometheus container can scrape
  # it over the compose network. This uses the otelconf `readers` form the
  # 0.119.0 default config itself emits (Pull→Prometheus host/port). It stays
  # INTERNAL to the compose network — compose.dev.yml publishes no :8888 port —
  # so nothing is exposed beyond the intended network (issue #10 posture holds).
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
