# deploy/compose.test.yml — S32 cross-plane integration stack
# (dk-p0-implementation-steps.md §"S32 — Cross-plane integration + adversarial +
# kill-switch suites"; dk-p0-monorepo.md §3 `task test:integration`).
#
# This is NOT the dev stack (compose.dev.yml, which adds the full observability
# trio + Spotlight + Mailpit for local development) and NOT the production
# topology (compose.prod.yml, S34 — distroless core image, uv --no-editable llm
# image, Caddy TLS ingress, WAL-backed Postgres). It is the minimal set of REAL
# services the five S32 system suites need: Postgres, mockdk (the offline DK
# stand-in, PRD §12.5/§19.3 — never live DK), core, the LLM plane, the built
# web static bundle, and a Caddy ingress that unifies web+gateway under ONE
# origin exactly like production (§19.3) — required so the browser-driven
# Playwright suites see real cross-plane data instead of a same-origin-only
# false green (see docs/implementation/dk-p0-progress.md's S32 entry for why
# this matters: without a shared origin, ALL cross-origin fetches from the web
# app fail closed to their generic error state, which several existing journey
# assertions are loose enough to still call "passing").
#
# core and the LLM plane run via `go run` / `uv run uvicorn` against the
# mounted repo (mirroring compose.dev.yml's mockdk pattern) rather than
# pre-built images — the distroless/uv production images are a deliberately
# separate S34 concern (dk-p0-monorepo.md §8).

name: market-ops-test

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: market_ops
      POSTGRES_PASSWORD: market_ops
      POSTGRES_DB: market_ops
    ports:
      # Exposed so the Go system-test suites (§16 edge cases, permission
      # parity, EXE-002 duplicate-write — internal/httpapi/system_*_test.go)
      # can run directly on the CI runner against this same Postgres, exactly
      # like the existing `go` CI job's scratch postgres:18 service container.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_ops -d market_ops -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  mockdk:
    image: golang:1.25
    working_dir: /src/services/core
    command: ["go", "run", "./cmd/mockdk"]
    environment:
      GOWORK: "off"
      GOFLAGS: "-mod=mod"
      MOCKDK_ADDR: ":8090"
    volumes:
      - ../:/src
    depends_on:
      migrate:
        condition: service_completed_successfully

  # --- one-shot schema migration + dev seed + owner credential -------------
  # `cmd/core` only runs River's OWN internal schema (jobs.Migrate) — it never
  # applies the goose app-schema migrations (0001..0017). Without this step
  # `core`/`cmd/seede2e` hit a schema-less DB ("relation users does not
  # exist") and the whole stack never becomes healthy. Mirrors exactly what
  # the existing `go` CI job does before `go:test` (task db:reset: goose up +
  # river migrate-up + fixtures/dev_seed.sql), against THIS compose network's
  # postgres host instead of localhost.
  #
  # `cmd/seede2e` (which sets the ONE password `dev_seed.sql`'s owner@dev.local
  # fixture never ships) runs HERE, in the SAME one-shot, immediately after
  # `task db:reset` — not inside `core`'s command. `task db:reset` DROPS and
  # recreates the schema (so it is NOT idempotent against an already-seeded
  # DB: every re-run wipes any password seede2e previously set). `core`, once
  # already running and healthy, is NOT recreated by a second `docker compose
  # up` unless its own config changed — so if `migrate` re-runs (e.g. the S32
  # kill-switch journey's `up`, then run_all.sh's own second `up` for
  # scenarios 2-5) while `core` stays up from a prior boot, a seede2e step
  # living inside `core`'s command would never re-fire, leaving the owner
  # freshly-schema'd but password-less — the exact silent lifecycle race that
  # produced a healthy stack with a 401 on every login. Folding db:reset and
  # seede2e into ONE atomic one-shot means every schema reset is ALWAYS
  # immediately followed by a password set, regardless of whether `core`
  # itself gets recreated on that particular `up`.
  migrate:
    image: golang:1.25
    working_dir: /src
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apt-get update -qq && apt-get install -y -qq --no-install-recommends postgresql-client curl >/dev/null &&
        mkdir -p /tmp/gobin && export PATH="/tmp/gobin:$$PATH" && export GOBIN=/tmp/gobin &&
        go install github.com/pressly/goose/v3/cmd/goose@v3.27.2 &&
        go install github.com/riverqueue/river/cmd/river@v0.40.0 &&
        curl -sSL https://taskfile.dev/install.sh | sh -s -- -b /tmp/gobin &&
        task db:reset &&
        (cd services/core && go run ./cmd/seede2e)
    environment:
      GOWORK: "off"
      GOFLAGS: "-mod=mod"
      DATABASE_URL: postgres://market_ops:market_ops@postgres:5432/market_ops?sslmode=disable
      # Required (no in-YAML default) — same single-source-of-truth contract
      # as before (task test:integration's seed-credential fix): the caller
      # (run_all.sh / run_killswitch_journey.sh) is the ONE place a default
      # is established; a propagation gap here must fail loud, not silently
      # mint a mismatched/absent credential.
      SEEDE2E_EMAIL: ${SEEDE2E_EMAIL:?SEEDE2E_EMAIL must be exported by the caller (see tools/integration/run_all.sh) before compose up}
      SEEDE2E_PASSWORD: ${SEEDE2E_PASSWORD:?SEEDE2E_PASSWORD must be exported by the caller (see tools/integration/run_all.sh) before compose up}
    volumes:
      - ../:/src
    depends_on:
      postgres:
        condition: service_healthy

  # --- LLM plane (services/llm), mock provider by default — no paid calls. ---
  llm:
    image: python:3.13-slim
    working_dir: /src/services/llm
    # uv installs into the mounted repo's cache; the image only needs uv itself.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        pip install --quiet --no-cache-dir uv &&
        uv sync --frozen &&
        uv run uvicorn llm.asgi:app --app-dir src --host 0.0.0.0 --port 8100
    environment:
      # LLM_* config is entirely environment-driven (services/llm/src/llm/config.py);
      # unset ⇒ the mock provider (LLM_PROVIDER_KIND defaults to mock), matching
      # every other offline suite in this repo (§12.5 — paid provider calls are a
      # gated, human-authorized S35 operation, never CI).
      HOME: /tmp
      # The mounted repo (../:/src) is the SAME checkout the CI job already ran
      # a host-side `uv sync --frozen --group dev` against (Python 3.12,
      # ci.yml's integration job) before `docker compose up`. Without this,
      # `uv sync`/`uv run` inside this python:3.13-slim container resolve the
      # uv workspace root at /src (repo root pyproject.toml) and reuse the
      # HOST's /src/.venv — whose interpreter symlink points at the host's
      # Python 3.12, which does not exist in this image, so `uv run uvicorn`
      # fails and the container exits(2), and the host's later `uv run` steps
      # then trip on container-touched/root-owned venv files. Pointing uv at a
      # container-local, non-mounted path keeps the two `uv` environments
      # (host CI runner, this container) fully isolated so neither observes or
      # mutates the other's virtualenv.
      UV_PROJECT_ENVIRONMENT: /opt/llm-venv
    volumes:
      - ../:/src
      # Belt-and-suspenders: even if some tool ignores UV_PROJECT_ENVIRONMENT,
      # this anonymous volume shadows the mounted host .venv inside the
      # container so it can never be read or written from here.
      - /src/.venv
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/healthz')"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  # --- Go core (gateway + domain), run against the mounted repo. -------------
  core:
    image: golang:1.25
    working_dir: /src/services/core
    # seede2e now runs inside `migrate` (see its comment above) — atomically
    # with `task db:reset`, so it re-fires on EVERY schema reset regardless of
    # whether this `core` container itself gets recreated on a given
    # `docker compose up`. `core` only needs the gateway/domain process, so
    # this is a plain exec-form command (list) — same pattern as `mockdk`
    # below, deliberately WITHOUT an `entrypoint: ["/bin/sh", "-c"]`
    # override. `/bin/sh -c` treats ONLY its first argument as the command
    # string to execute and passes any further array elements as positional
    # parameters ($0, $1, ...) to THAT string, not as additional argv to
    # exec — so `entrypoint: ["/bin/sh", "-c"]` + `command: ["go", "run",
    # "./cmd/core"]` actually ran bare `go` (with "run" as $0 and
    # "./cmd/core" as $1, both ignored), which just printed Go's generic
    # usage help and exited(2) — the exact S32 integration regression this
    # fixes (core never started, so `up --wait` never succeeded, so every
    # scenario failed). `entrypoint`+`command: ["/bin/sh","-c","<string>"]`
    # (a single joined string) is only needed for the OTHER services here
    # (`migrate`, `llm`) because their commands are actual multi-step shell
    # scripts (`&&`-chained pipelines) that need a real shell to interpret.
    command: ["go", "run", "./cmd/core"]
    environment:
      GOWORK: "off"
      GOFLAGS: "-mod=mod"
      APP_ENV: dev # Secure cookie flag off — matches the un-TLS'd test ingress.
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://market_ops:market_ops@postgres:5432/market_ops?sslmode=disable
      DK_API_BASE_URL: http://mockdk:8090
      LLM_SERVICE_URL: http://llm:8100
      LLM_GATEWAY_TOKEN: s32-integration-gateway-token
      # 32-byte key, base64 — test-only, never the production secret
      # (dk-p0-monorepo.md §8: secrets are environment-only, never defaulted).
      CONNECTOR_ENCRYPTION_KEY: mkvAIfG+QW29zMxw5iflub+g59dAj3Dh1KAAcoglQHM=
    volumes:
      - ../:/src
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mockdk:
        condition: service_started
      llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  # --- Caddy ingress: ONE origin for web + gateway, mirroring §19.3's prod
  # topology (single VPS, Caddy ingress) — never Kubernetes, never a second
  # bespoke proxy technology.
  #
  # Caddy ALSO serves the built web bundle directly (file_server + SPA history
  # fallback in Caddyfile.integration), exactly like compose.prod.yml where
  # Caddy serves the static dist/. A prior `python3 -m http.server` web
  # container had NO history fallback, so deep-link SPA routes (/onboarding,
  # /products, /today, /bulk, …) returned 404 and the app never booted —
  # failing every S32 Playwright journey. apps/web/dist is built by the run
  # scripts (run_all.sh / run_killswitch_journey.sh) before `docker compose
  # up` and mounted read-only here; there is no separate web service to serve
  # it fallback-lessly.
  caddy:
    image: caddy:2.9-alpine
    volumes:
      - ./caddy/Caddyfile.integration:/etc/caddy/Caddyfile:ro
      - ../apps/web/dist:/srv/web:ro
    ports:
      - "8888:8888"
    depends_on:
      core:
        condition: service_healthy
