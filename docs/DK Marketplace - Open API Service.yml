openapi: 3.0.0
info:
    title: 'DK Marketplace - Open API Service'
    description: "This project is an <b>enhancement of the Digikala Marketplace API</b>. Its main goal is providing an API-based solution for Developers useful for implementing new Applications To improve Digikala Sellers Business. <br>To use these APIs, you must have an <b>'Active Client'</b> registered in Digikala. If you don't, You can use the <b>[Sandbox](https://github.com/salimousavi/seller_service_sandbox)</b> (with Mock Data) to develop your Application. <br>For More Information (Client Registration, Issues, Bugs and suggestions), please contact us.\n### API count: 246"
    version: 1.0.0
    contact: { email: Marketplace-API@digikala.com }
servers:
    - { url: 'https://seller.digikala.com', description: 'DK Marketplace Open API (Production Mode)' }
paths:
