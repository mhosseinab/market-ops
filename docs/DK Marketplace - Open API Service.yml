ion: 'list of product types that is assigned to selected category', items: { type: object, properties: { value: { type: string, example: '123', description: 'product type id' }, text: { type: string, example: 'تابلو چارت', description: 'product type title' } } } }, product_classes: { type: array, description: 'list of product classes that is assigned to selected category', items: { type: object, properties: { value: { type: string, example: '123', description: 'product class id' }, text: { type: string, example: 'آرجی‌بی RGB', description: 'product class title' } } } }, divisions: { type: array, description: 'list of divisions assigned to the selected category (useful for creating product title)', items: { type: string, example: 'division title' } }, guideline: { type: object, description: 'some hint and guidance for the selected category', properties: { category_selection: { type: object, description: '', properties: { video: { type: string, example: 'https://dkstatics-public.digikala.com/digikala-brands/80005e48c', description: 'video about category selection' }, short_description: { type: string, example: 'برای انتخاب گروه، لطفا نمونه مشابه کالای خود را در سایت دیجیکالا جست و جو کنید و چنانچه کالای یافت شده با کالایی که قصد درج آن را دارید یکسان بود، همان گروه را برای درج کالا انتخاب کنید.', description: 'hint about category selection' } } }, attributes: { type: object, description: '', properties: { video: { type: string, example: 'https://dkstatics-public.digikala.com/digikala-brands/80005e48c', description: 'video about attribute selection' }, short_description: { type: string, example: 'توضیح کوتاه', description: 'short hint about attributes' }, items: { type: array, description: 'attribute item', items: { type: object, properties: { title: { type: string, example: 'مشخصات فنی نوشتاری', description: 'title of attribute item' }, content: { type: string, example: "<p>لطفا در هنگام نوشتن مشخصات فنی، به نکات زیر دقت کنید:</p>\n\n<p>1- &nbsp; &nbsp; تمام مشخصات فنی ذکر شده در این قسمت باید با مشخصات کالا در تصاویر، عنوان و شرح کالا یکسان باشد در صورت مغایرت این اطلاعات با هم، کالای شما در زمان بررسی رد می شود.<br />\n2- &nbsp; &nbsp;مشخصات فنی وارد شده باید دقیقا مطابق با کالایی باشد که بفروش میرسانید و در صورت هر گونه مغایرت، کالا به این دلیل مرجوع و فروشنده جریمه می شود.&nbsp;<br />\n3- &nbsp; &nbsp; املا و نگارش کلمات باید صحیح باشد و هیچ غلط املایی در آن وجود نداشته باشد.<br />\n4- &nbsp; &nbsp;در مشخصات فنی نباید نام فروشگاه، قیمت و گارانتی کالا را بنویسید.<br />\n5- &nbsp; &nbsp; مشخصات فنی، مشخصات دقیقی هستند، بنابراین نباید از عبارات تبلیغاتی و سلیقه ای استفاده کنید.<br />\nمثال: عمر مفید زیاد، ظاهر زیبا و...<br />\n6- &nbsp; &nbsp;اگر مشخصه ی فنی دارای واحد اندازه گیری است، حتما از مطابقت این عدد با واحد اندازه گیری اطمینان حاصل کنید. در صورت مغایرت، احتمال مرجوع شدن کالا زیاد است.<br />\n7- &nbsp; &nbsp; چنانچه کالای درج شده، چند پارچه یا چند تکه است باید مشخصات فنی تمام اجزا را در مشخصات کالا ذکر کنید.</p>", description: 'hint about attribute items' } } } } } }, product_info: { type: object, description: 'some hint about product info (like product badges)', properties: { video: { type: string, example: 'https://dkstatics-public.digikala.com/digikala-brands/80005e48c', description: 'video about product info' }, short_description: { type: string, example: هرچی, description: 'hint about product info' }, items: { type: array, description: 'list of product info items', items: { type: object, properties: { title: { type: string, example: 'نشان غیراصل', description: 'title of product info item' }, content: { type: string, example: "<p>اصالت کالا (نشان غیر اصل): اگر روی کالا برندی وجود دارد که آن محصول توسط آن برند تولید نشده است، باید از نشان غیر اصل استفاده کنید. اگرروی کالا هیچ برندی وجود ندارد، نباید از نشان غیر اصل استفاده کرد و محصول را با برند متفرقه درج کنید.</p>\n\n<p>1- &nbsp; &nbsp;اگر محصول غیراصل است و از نشان غیر اصل استفاده می&zwnj;کنید، نباید هیچ برندی در عنوان کالا ذکر شود.<br />\n2- &nbsp; &nbsp;اگر کالایی نشان غیر اصل نداشته باشد به معنای این است که آن کالا اصل و تولید شده توسط آن برند است. اگر روی این کالا، کالای فیک بفروشید، مشمول جریمه خواهید شد. برای اطلاع بیشتر به این <a href=\"https://www.digikala.com/s/7ilfbc\">لینک</a><strong> </strong> مراجعه کنید.</p>", description: 'hint for product info item' } } } } } }, media: { type: object, description: 'guidance about product media in the selected category', properties: { video: { type: string, example: 'https://dkstatics-public.digikala.com/digikala-brands/80005e48c', description: 'video for media guidance' }, short_description: { type: string, example: 'توضیح کوتاه', description: 'hint for media guidance' }, items: { type: array, description: 'list of media items with specific guidance', items: { type: object, properties: { title: { type: string, example: 'تصویر آلبوم', description: 'media item title' }, content: { type: string, example: "<p>تصاویر آلبوم برای نمایش زوایا و کاربرد کالا به مشتری است.<br />\n1- &nbsp; &nbsp;در هیچ کدام از تصاویر آلبوم نباید هیچ لوگو و واترمارکی وجود داشته باشد.<br />\n2- &nbsp; &nbsp;در تصاویر آلبوم نباید هیچ آدرس سایت، شماره تلفن و نشانی شبکه ها اجتماعی وجود داشته باشد. (لطفا اگر این موارد روی کالا یا بسته بندی وجود دارد طوری عکاسی کنید تا این موارد در تصاویر دیده نشود.)<br />\n3- &nbsp; &nbsp;در تصاویر آلبوم، طرح های مختلف یک کالا را قرار ندهید، برای هر طرح باید یک کالای جداگانه درج شود.<br />\n4- &nbsp; &nbsp;دقت کنید که بین هیچ کدام از تصاویر نباید مغایرتی وجود داشته باشد.</p>", description: 'hint for media item' } } } } } } } }, category_data: { type: object, description: 'details of selected category', properties: { categoryTheme: { type: string, example: no_color_no_size, description: 'theme of product variants in this category', enum: [no_color_no_size, colored, sized] }, categoryThemeTranslated: { type: string, example: 'بدون رنگ یا سایز', description: 'theme name FA' }, categoryTitle: { type: string, example: 'نقشه چاپی', description: 'selected category name FA' } } }, al