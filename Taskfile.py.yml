version: '3'

# Python tasks. uv only; a single root .venv is shared by all Python members.
# mypy is ALWAYS invoked from the repo root (whole packages, never staged files).

tasks:
  test:
    desc: Run the Python plane and generated-client contract regression suites.
    cmds:
      - uv run pytest services/llm contracts/tools/test_normalize_python_client_auth.py -q

  lint:
    desc: Ruff check + strict mypy for the LLM plane and integration tooling, from the repo root.
    cmds:
      - uv run ruff check services/llm tools/integration contracts/tools/*.py
      - uv run mypy services/llm tools/integration

  fmt:
    desc: Format Python sources with ruff.
    cmds:
      - uv run ruff format services/llm contracts/tools/*.py

  build:
    desc: Build the LLM plane wheel.
    cmds:
      - uv build --package market-ops-llm
